const todayISO = () => new Date().toISOString().split('T')[0];
const fmtUK = (s) => {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
};
const addYears = (iso, n) => {

/* ---------------------------- GOLD SEAL (matches cert) ---------------------------- */
const GoldSeal = ({ size = 96 }) => {
  const pts = [];
  const teeth = 16, cx = 50, cy = 50, rO = 47, rI = 42;
  for (let i = 0; i < teeth * 2; i++) {
    const r = i % 2 === 0 ? rO : rI;
    const a = (Math.PI / teeth) * i - Math.PI / 2;
    pts.push(`${(cx + r * Math.cos(a)).toFixed(2)},${(cy + r * Math.sin(a)).toFixed(2)}`);
  }
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <polygon points={pts.join(' ')} fill="none" stroke="#A67C2E" strokeWidth="2.2" strokeLinejoin="round"/>
      <circle cx="50" cy="50" r="36" fill="none" stroke="#A67C2E" strokeWidth="2"/>
      <text x="50" y="44" textAnchor="middle" fontSize="11" fill="#A67C2E" fontFamily="Inter" fontWeight="700" letterSpacing="1">QQI</text>
      <text x="50" y="58" textAnchor="middle" fontSize="9" fill="#A67C2E" fontFamily="Inter" fontWeight="600">LEVEL 6</text>
      <path d="M40 64 l6 5 14 -14" fill="none" stroke="#A67C2E" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

/* ---------------------------- LOGO (GitHub link with embedded fallback) ---------------------------- */
function Logo({ theme, className, onClick, title }) {
  const url = logoUrlFor(theme);
  const b64 = LOGO_B64[theme];
  const [src, setSrc] = useState(url || b64);
  useEffect(() => { setSrc(url || b64); }, [theme]);
  return (
    <img src={src} alt={THEMES[theme].name} className={className} onClick={onClick} title={title}
      onError={() => { if (src !== b64) setSrc(b64); }} />
  );
}

/* ======================================================================
   FIREBASE  (Auth + Firestore)
   ====================================================================== */
try { firebase.initializeApp(CONFIG.firebaseConfig); } catch (e) {}
const fbAuth = (typeof firebase !== 'undefined') ? firebase.auth() : null;
const db = (typeof firebase !== 'undefined') ? firebase.firestore() : null;
try { if (fbAuth) fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); } catch (e) {}

const COL = {
  audits: () => db.collection('audits'),
  training: () => db.collection('training'),
  sites: () => db.collection('sites'),
  employees: () => db.collection('employees'),
  users: () => db.collection('users')
};
const appUrl = () => window.location.origin + window.location.pathname;
const emailCertToOffice = (brand, record) => {
  if (!CONFIG.MAILER_URL) return;
  try {
    fetch(CONFIG.MAILER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ secret: CONFIG.MAILER_SECRET, brand: brand, record: record })
    }).catch(function () {});
  } catch (e) {}
};

/* ======================================================================
   APP
   ====================================================================== */
function App() {
  const initialBrand = (typeof window !== 'undefined' && window.__BRAND__) ? window.__BRAND__ : ((safeStore.get(CACHE_KEY) || {}).theme || 'ifes');
  const [theme, setTheme] = useState(initialBrand);
  const t = THEMES[theme];
  const preview = CONFIG.LOCAL_PREVIEW;

  const [authReady, setAuthReady] = useState(preview);
  const [user, setUser] = useState(preview ? { email: 'preview@local' } : null);
  const [role, setRole] = useState(preview ? 'admin' : null);
  const isAdmin = role === 'admin';

  const [loginEmail, setLoginEmail] = useState('');
  const [emailSent, setEmailSent] = useState(false);
  const [loginErr, setLoginErr] = useState('');
  const [loginBusy, setLoginBusy] = useState(false);

  const [tab, setTab] = useState('schedule');
  const [mobileMenu, setMobileMenu] = useState(false);

  const [sites, setSites] = useState(preview ? SEED_SITES : []);
  const [employees, setEmployees] = useState(preview ? SEED_EMPLOYEES : []);
  const [audits, setAudits] = useState(preview ? SEED_AUDITS : []);
  const [training, setTraining] = useState(preview ? SEED_TRAINING : []);
  const [people, setPeople] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(() => { safeStore.set(CACHE_KEY, { theme }); }, [theme]);

  // ---- PWA install ----
  const [installEvt, setInstallEvt] = useState(null);
  const [showIos, setShowIos] = useState(false);
  const isStandalone = (typeof window !== 'undefined') && (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
  const isIos = (typeof navigator !== 'undefined') && /iphone|ipad|ipod/i.test(navigator.userAgent);
  useEffect(() => {
    const h = (e) => { e.preventDefault(); setInstallEvt(e); };
    window.addEventListener('beforeinstallprompt', h);
    return () => window.removeEventListener('beforeinstallprompt', h);
  }, []);
  const currentBrand = (typeof window !== 'undefined' && window.__BRAND__) ? window.__BRAND__ : 'ifes';
  const installAs = async (target) => {
    if (target && target !== currentBrand) {
      const url = new URL(window.location.href); url.searchParams.set('brand', target); window.location.href = url.toString(); return;
    }
    if (installEvt) { installEvt.prompt(); await installEvt.userChoice; setInstallEvt(null); }
    else { setShowIos(true); }
  };
  const canShowInstall = !isStandalone;

  // ---- Auth: finish email-link sign-in, then watch state and load role ----
  useEffect(() => {
    if (preview || !fbAuth) return;
    if (fbAuth.isSignInWithEmailLink(window.location.href)) {
      let email = safeStore.get('authEmail');
      if (!email) email = window.prompt('Confirm your email to finish signing in');
      if (email) {
        fbAuth.signInWithEmailLink(email, window.location.href)
          .then(() => { safeStore.del('authEmail'); window.history.replaceState({}, '', appUrl()); })
          .catch(() => setLoginErr('That sign-in link is invalid or has expired. Ask for a new one.'));
      }
    }
    const unsub = fbAuth.onAuthStateChanged(async (u) => {
      if (u) {
        try {
          const snap = await COL.users().doc((u.email || '').toLowerCase()).get();
          if (snap.exists) { setUser(u); setRole(snap.data().role || 'viewer'); }
          else { await fbAuth.signOut(); setUser(null); setRole(null); setLoginErr('This email is not on the access list. Ask an admin to add you.'); }
        } catch (e) {
          await fbAuth.signOut(); setUser(null); setRole(null);
          setLoginErr('This email is not on the access list yet.');
        }
      } else { setUser(null); setRole(null); }
      setAuthReady(true);
    });
    return () => unsub();
  }, []);

  // ---- Live data once signed in ----
  useEffect(() => {
    if (preview || !user || !role || !db) return;
    const subs = [];
    const map = (s) => s.docs.map(d => Object.assign({ id: d.id }, d.data()));
    subs.push(COL.audits().onSnapshot(s => setAudits(map(s)), () => {}));
    subs.push(COL.training().onSnapshot(s => setTraining(map(s)), () => {}));
    subs.push(COL.sites().onSnapshot(s => setSites(map(s).map(x => x.name).filter(Boolean)), () => {}));
    subs.push(COL.employees().onSnapshot(s => setEmployees(map(s).map(x => x.name).filter(Boolean)), () => {}));
    if (role === 'admin') subs.push(COL.users().onSnapshot(s => setPeople(map(s)), () => {}));
    return () => subs.forEach(u => u && u());
  }, [user, role]);

  // ---- Auth actions ----
  const sendLink = async (e) => {
    e.preventDefault(); setLoginErr(''); setLoginBusy(true);
    try {
      const email = loginEmail.trim().toLowerCase();
      if (!email) { setLoginBusy(false); return; }
      await fbAuth.sendSignInLinkToEmail(email, { url: appUrl(), handleCodeInApp: true });
      safeStore.set('authEmail', email);
      setEmailSent(true);
    } catch (err) {
      setLoginErr('Could not send the link. Check the email and that your domain is authorised in Firebase.');
    } finally { setLoginBusy(false); }
  };
  const logout = () => { setTab('schedule'); setMobileMenu(false); if (!preview && fbAuth) fbAuth.signOut(); setUser(null); setRole(null); setEmailSent(false); };

  const requireAdmin = () => { if (!isAdmin) { alert('Admin access is required.'); return false; } return true; };

  // ---- Mutations (Firestore) ----
  const addAudit = async (rec) => {
    if (!requireAdmin()) return;
    if (preview) { setAudits(a => [...a, Object.assign({}, rec, { id: 'p' + Date.now(), status: 'Pending' })]); return; }
    await COL.audits().add({ site: rec.site, date: rec.date, foreman: rec.foreman || '', notes: rec.notes || '', status: 'Pending' });
  };
  const toggleAudit = async (id) => {
    if (!requireAdmin()) return;
    if (preview) { setAudits(a => a.map(x => x.id === id ? Object.assign({}, x, { status: x.status === 'Pending' ? 'Completed' : 'Pending' }) : x)); return; }
    const cur = audits.find(a => a.id === id); if (!cur) return;
    await COL.audits().doc(id).update({ status: cur.status === 'Pending' ? 'Completed' : 'Pending' });
  };
  const deleteAudit = async (id) => {
    if (!requireAdmin()) return;
    if (preview) { setAudits(a => a.filter(x => x.id !== id)); return; }
    await COL.audits().doc(id).delete();
  };
  const addTraining = async (rec) => {
    if (!requireAdmin()) return;
    if (preview) { setTraining(tr => [...tr, Object.assign({}, rec, { id: 'p' + Date.now(), status: 'Scheduled', issueDate: '', expiryDate: '', certIssued: false })]); return; }
    await COL.training().add({ employee: rec.employee, date: rec.date, status: 'Scheduled', issueDate: '', expiryDate: '', certIssued: false, email: rec.email || '' });
  };
  const completeTraining = async (id) => {
    if (!requireAdmin()) return null;
    const cur = training.find(x => x.id === id); if (!cur) return null;
    const issue = todayISO(); const expiry = addYears(cur.date, 3);
    const updated = Object.assign({}, cur, { status: 'Completed', issueDate: issue, expiryDate: expiry });
    if (preview) { setTraining(tr => tr.map(x => x.id === id ? updated : x)); return updated; }
    await COL.training().doc(id).update({ status: 'Completed', issueDate: issue, expiryDate: expiry, certIssued: true });
    emailCertToOffice(theme, updated);
    return updated;
  };
  const deleteTraining = async (id) => {
    if (!requireAdmin()) return;
    if (preview) { setTraining(tr => tr.filter(x => x.id !== id)); return; }
    await COL.training().doc(id).delete();
  };
  const addSite = async (name) => {
    if (!requireAdmin() || !name.trim()) return;
    if (sites.includes(name.trim())) return;
    if (preview) { setSites(s => [...s, name.trim()]); return; }
    await COL.sites().add({ name: name.trim() });
  };
  const addEmployee = async (name) => {
    if (!requireAdmin() || !name.trim()) return;
    if (employees.includes(name.trim())) return;
    if (preview) { setEmployees(s => [...s, name.trim()]); return; }
    await COL.employees().add({ name: name.trim() });
  };

  // ---- People / invites (admin) ----
  const invitePerson = async (email, prole) => {
    if (!requireAdmin()) return { ok: false };
    const e = (email || '').trim().toLowerCase();
    if (!e) return { ok: false, msg: 'Enter an email.' };
    try {
      await COL.users().doc(e).set({ email: e, role: prole || 'viewer', invitedAt: Date.now() });
      await fbAuth.sendSignInLinkToEmail(e, { url: appUrl(), handleCodeInApp: true });
      return { ok: true };
    } catch (err) {
      return { ok: false, msg: 'Could not send invite. Check the email and Firebase auth settings.' };
    }
  };
  const removePerson = async (email) => {
    if (!requireAdmin()) return;
    await COL.users().doc(email).delete();
  };

  const Field = ({ label, hint, children }) => (
    <div>
      <label className="block text-sm font-semibold text-slate-700 mb-2">
        {label} {hint && <span className="text-slate-400 font-normal">{hint}</span>}
      </label>
      {children}
    </div>
  );
  const inputCls = "w-full border border-slate-300 rounded-lg p-3 bg-slate-50 focus:bg-white focus:ring-2 focus:outline-none transition";

  // ===== Auth gate =====
  if (!preview && !authReady) {
    return <div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: t.lightBg }}><p className="text-slate-500">Loading...</p></div>;
  }

  if (!user || !role) {
    return (
      <div className="min-h-screen flex items-center justify-center p-4" style={{ backgroundColor: t.lightBg }}>
        <div className="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden animate-fade-in">
          <div style={{ backgroundColor: t.primary }} className="px-8 py-8 text-center">
            <Logo theme={theme} className="h-20 mx-auto object-contain mb-3 bg-white/95 rounded-lg p-1.5" />
            <h1 className="text-white text-lg font-semibold tracking-wide">Health &amp; Safety Portal</h1>
          </div>
          {emailSent ? (
            <div className="p-8 text-center space-y-3">
              <div className="mx-auto w-fit text-emerald-500"><I.mail size={40} /></div>
              <h2 className="font-bold text-slate-800">Check your email</h2>
              <p className="text-sm text-slate-600">We sent a sign-in link to <b>{loginEmail}</b>. Open it on this device to sign in.</p>
              <button onClick={() => setEmailSent(false)} className="text-sm text-slate-400 underline">Use a different email</button>
            </div>
          ) : (
            <form onSubmit={sendLink} className="p-8 space-y-5">
              <p className="text-sm text-slate-600">Sign in with your work email. We email you a one-tap link, no password to remember.</p>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                <div className="relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><I.mail size={18} /></span>
                  <input type="email" autoFocus value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)}
                    placeholder="you@company.ie"
                    className="w-full border border-slate-300 rounded-lg pl-10 pr-3 py-3 focus:ring-2 focus:outline-none"
                    style={{ '--tw-ring-color': t.primary }} />
                </div>
              </div>
              {loginErr && <p className="text-sm text-red-600 font-medium">{loginErr}</p>}
              <button type="submit" disabled={loginBusy} style={{ backgroundColor: t.secondary }}
                className="w-full text-white font-bold py-3 rounded-lg hover:brightness-95 transition disabled:opacity-60">
                {loginBusy ? 'Sending...' : 'Email me a sign-in link'}
              </button>
              <p className="text-[11px] text-center text-slate-400">Only people added by an admin can get in.</p>
              {canShowInstall && (
                <div className="pt-1">
                  <p className="text-xs text-center text-slate-500 mb-2">Add to your phone as an app</p>
                  <div className="grid grid-cols-2 gap-2">
                    <button type="button" onClick={() => installAs('ifes')}
                      className="flex items-center justify-center gap-1.5 text-sm font-semibold py-2.5 rounded-lg border-2 transition"
                      style={currentBrand === 'ifes' ? { backgroundColor: THEMES.ifes.primary, color: '#fff', borderColor: THEMES.ifes.primary } : { borderColor: THEMES.ifes.primary, color: THEMES.ifes.primary }}>
                      <I.down size={15} /> IFES app
                    </button>
                    <button type="button" onClick={() => installAs('tsg')}
                      className="flex items-center justify-center gap-1.5 text-sm font-semibold py-2.5 rounded-lg border-2 transition"
                      style={currentBrand === 'tsg' ? { backgroundColor: THEMES.tsg.primary, color: '#fff', borderColor: THEMES.tsg.primary } : { borderColor: THEMES.tsg.primary, color: THEMES.tsg.primary }}>
                      <I.down size={15} /> TSG app
                    </button>
                  </div>
                </div>
              )}
            </form>
          )}
        </div>
        {showIos && <IosHelp t={t} isIos={isIos} brand={currentBrand} onClose={() => setShowIos(false)} />}
      </div>
    );

  const NavBtn = ({ id, icon, label, mobile }) => (
    <button onClick={() => { setTab(id); if (mobile) setMobileMenu(false); }}
      style={{ backgroundColor: tab === id ? t.secondary : 'transparent' }}
      className={`flex items-center ${mobile ? 'w-full px-3 py-3 text-base' : 'px-4 py-2 text-sm'} rounded-md font-medium transition ${tab === id ? 'text-white shadow-sm' : 'text-white/80 hover:bg-white/10'}`}>
      <span className="mr-2">{icon}</span> {label}
    </button>
  );

  return (
    <div className="min-h-screen" style={{ backgroundColor: t.lightBg, transition: 'background-color .3s' }}>
      {preview && (
        <div className="bg-red-600 text-white text-center text-xs font-semibold py-1 no-print">
          PREVIEW MODE - no backend, no real security. Set LOCAL_PREVIEW to false before publishing.
        </div>
      )}

      <header className="bg-white border-b border-slate-200 shadow-sm relative z-20 no-print">
        <div className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
          <Logo theme={theme} className="h-14 object-contain cursor-pointer hover:scale-105 transition"
            title="Click to switch organisation theme" onClick={() => setTheme(theme === 'ifes' ? 'tsg' : 'ifes')} />

            <span className={`hidden sm:inline-flex items-center text-xs font-semibold px-3 py-1 rounded-full ${isAdmin ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>
              {isAdmin ? 'Admin' : 'View'}

            <div className="hidden md:flex items-center text-slate-500">
              <I.hat size={20} className="mr-2" />
              <span className="font-semibold text-sm uppercase tracking-wider">Health &amp; Safety</span>
            </div>
            {canShowInstall && (
              <button onClick={() => installAs(currentBrand)} title="Install app" className="flex items-center text-slate-500 hover:text-slate-800 text-sm font-medium">
                <I.down size={18} className="mr-1" /> <span className="hidden sm:inline">Install</span>
              </button>
            )}
            <button onClick={logout} title="Log out" className="flex items-center text-slate-500 hover:text-slate-800 text-sm font-medium">
              <I.out size={18} className="mr-1" /> <span className="hidden sm:inline">Log out</span>
            </button>
          </div>
        </div>
      </header>

      <nav style={{ backgroundColor: t.primary }} className="text-white shadow-md relative z-10 no-print transition-colors">
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex justify-between h-14">
            <div className="hidden md:flex items-center gap-2">
              <NavBtn id="schedule" icon={<I.cal size={18} />} label="Schedule" />
              <NavBtn id="audit" icon={<I.clip size={18} />} label="Audit checks" />
              {isAdmin && <NavBtn id="people" icon={<I.users size={18} />} label="People" />}
            </div>
            <div className="md:hidden flex items-center w-full justify-between">
              <span className="font-semibold tracking-wide px-2">Menu</span>
              <button onClick={() => setMobileMenu(!mobileMenu)} className="p-2">{mobileMenu ? <I.x size={24} /> : <I.menu size={24} />}</button>
            </div>
          </div>
        </div>
        {mobileMenu && (
          <div style={{ backgroundColor: t.primary }} className="md:hidden px-2 pb-3 space-y-1 border-t border-white/10">
            <NavBtn id="schedule" icon={<I.cal size={18} />} label="Schedule" mobile />
            <NavBtn id="audit" icon={<I.clip size={18} />} label="Audit checks" mobile />
            {isAdmin && <NavBtn id="people" icon={<I.users size={18} />} label="People" mobile />}
          </div>
        )}
      </nav>

      <main className="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        {tab === 'schedule' && <ScheduleView t={t} audits={audits} training={training} isAdmin={isAdmin} toggleAudit={toggleAudit} loading={loading} />}
        {tab === 'audit' && <AuditChecksView t={t} theme={theme} isAdmin={isAdmin}
          sites={sites} employees={employees} audits={audits} training={training}
          addAudit={addAudit} deleteAudit={deleteAudit} addTraining={addTraining}
          completeTraining={completeTraining} deleteTraining={deleteTraining}
          addSite={addSite} addEmployee={addEmployee} Field={Field} inputCls={inputCls} />}
        {tab === 'people' && isAdmin && <PeopleView t={t} people={people} invitePerson={invitePerson} removePerson={removePerson} myEmail={user.email} Field={Field} inputCls={inputCls} />}
      </main>

      {showIos && <IosHelp t={t} isIos={isIos} brand={currentBrand} onClose={() => setShowIos(false)} />}
    </div>
  );
}

        <h3 className="font-bold text-slate-900 text-lg mb-1">Add to Home Screen</h3>
        <p className="text-sm text-slate-500 mb-3">This adds the <b>{brand === 'tsg' ? 'TSG' : 'IFES'}</b> app.</p>
        {isIos ? (
          <ol className="text-sm text-slate-600 space-y-2 list-decimal list-inside">
            <li>Tap the <b>Share</b> icon at the bottom of Safari.</li>
            <li>Scroll down and tap <b>Add to Home Screen</b>.</li>
            <li>Tap <b>Add</b>.</li>
          </ol>
        ) : (
          <ol className="text-sm text-slate-600 space-y-2 list-decimal list-inside">
            <li>Open this page in <b>Chrome</b>.</li>

function PeopleView({ t, people, invitePerson, removePerson, myEmail, Field, inputCls }) {
  const [email, setEmail] = useState('');
  const [prole, setProle] = useState('viewer');
  const [msg, setMsg] = useState(null);
  const [busy, setBusy] = useState(false);
  const submit = async (e) => {
    e.preventDefault(); setMsg(null); setBusy(true);
    const res = await invitePerson(email, prole);
    setBusy(false);
    if (res.ok) { setMsg({ ok: true, text: 'Invite sent to ' + email.trim().toLowerCase() }); setEmail(''); }
    else { setMsg({ ok: false, text: res.msg || 'Could not send invite.' }); }
  };
  return (
    <div className="space-y-8 animate-fade-in">
      <header>
        <h1 className="text-2xl sm:text-3xl font-bold text-slate-900">People and access</h1>
        <p className="text-slate-600 mt-1">Add someone by email and they get a sign-in link automatically. Only people listed here can use the app.</p>
      </header>

      <form onSubmit={submit} className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden max-w-2xl">
        <div style={{ backgroundColor: t.primary }} className="px-6 py-4">
          <h2 className="text-white font-bold flex items-center"><I.plus className="mr-2" size={20} /> Add a person</h2>
        </div>
        <div className="p-6 space-y-4">
          <Field label="Email">
            <input type="email" required className={inputCls} placeholder="name@company.ie" value={email} onChange={(e) => setEmail(e.target.value)} />
          </Field>
          <Field label="Access level">
            <div className="flex gap-3">
              <button type="button" onClick={() => setProle('viewer')}
                className="flex-1 py-2.5 rounded-lg border-2 text-sm font-semibold transition"
                style={prole === 'viewer' ? { backgroundColor: t.primary, color: '#fff', borderColor: t.primary } : { borderColor: '#cbd5e1', color: '#475569' }}>
                View only
              </button>
              <button type="button" onClick={() => setProle('admin')}
                className="flex-1 py-2.5 rounded-lg border-2 text-sm font-semibold transition"
                style={prole === 'admin' ? { backgroundColor: t.primary, color: '#fff', borderColor: t.primary } : { borderColor: '#cbd5e1', color: '#475569' }}>
                Admin
              </button>
            </div>
          </Field>
          {msg && <p className={`text-sm font-medium ${msg.ok ? 'text-emerald-600' : 'text-red-600'}`}>{msg.text}</p>}
          <button type="submit" disabled={busy} style={{ backgroundColor: t.secondary }}
            className="w-full text-white font-bold py-3 rounded-lg hover:brightness-95 transition disabled:opacity-60 flex justify-center items-center">
            <I.mail className="mr-2" size={18} /> {busy ? 'Sending...' : 'Add and send sign-in link'}
          </button>
        </div>
      </form>

      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden max-w-2xl">
        <div className="px-6 py-4 border-b border-slate-100"><h2 className="font-bold text-slate-800">Current people ({people.length})</h2></div>
        {people.length === 0 ? (
          <p className="p-6 text-sm text-slate-400 italic">No one added yet.</p>
        ) : (
          <ul className="divide-y divide-slate-100">
            {people.map(p => (
              <li key={p.id} className="px-6 py-3 flex items-center justify-between">
                <div>
                  <p className="font-medium text-slate-800">{p.email}</p>
                  <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${p.role === 'admin' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>{p.role === 'admin' ? 'Admin' : 'View'}</span>
                </div>
                {p.email !== (myEmail || '').toLowerCase()
                  ? <button onClick={() => removePerson(p.id)} className="text-slate-300 hover:text-red-500" title="Remove"><I.trash size={18} /></button>
                  : <span className="text-xs text-slate-400">you</span>}
              </li>
            ))}
          </ul>
        )}
      </div>
    </div>
  );
}

/* ======================================================================
   PAGE 1  -  SCHEDULE (read-only dashboard for everyone)
   ====================================================================== */
function ScheduleView({ t, audits, training, isAdmin, toggleAudit, loading }) {
  const pending = audits.filter(a => a.status === 'Pending').sort((a,b)=>new Date(a.date)-new Date(b.date));
  const done = audits.filter(a => a.status === 'Completed').sort((a,b)=>new Date(b.date)-new Date(a.date));
  const upcomingTraining = [...training].sort((a,b)=>new Date(a.date)-new Date(b.date));

  return (
    <div className="space-y-10 animate-fade-in">
      <header>
        <h1 className="text-2xl sm:text-3xl font-bold text-slate-900">Schedule overview</h1>
        <p className="text-slate-600 mt-1">What audits and training are coming up. {loading && <span className="text-slate-400">Loading...</span>}</p>
      </header>

      <section>
        <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center border-b pb-2">
          <I.clip className="mr-2" style={{ color: t.primary }} /> Upcoming audits
        </h2>
        {pending.length === 0 ? (
          <Empty icon={<I.check size={42} />} text="No audits scheduled. All caught up." />
        ) : (
          <div className="grid gap-5 md:grid-cols-2 lg:grid-cols-3">
            {pending.map(a => (
              <div key={a.id} className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition relative">
                <div className="absolute top-0 left-0 w-1 h-full" style={{ backgroundColor: t.auditType }} />
                <div className="p-5">
                  <div className="flex justify-between items-start mb-3">
                    <span style={{ backgroundColor: t.auditType }} className="text-white px-3 py-1 rounded-full text-xs font-semibold">Site Audit</span>
                    {isAdmin && (
                      <button onClick={() => toggleAudit(a.id)} title="Mark complete"
                        className="text-slate-300 hover:text-emerald-500 transition"><I.circle size={26} /></button>
                    )}
                  </div>
                  <h3 className="font-bold text-slate-900 flex items-start"><I.bldg size={18} className="mr-2 mt-0.5 text-slate-400 shrink-0" />{a.site}</h3>
                  <div className="text-sm text-slate-600 pl-6 mt-1 space-y-0.5">
                    <p><span className="text-slate-400">Foreman:</span> {a.foreman || 'Unassigned'}</p>
                    <p className="font-medium text-slate-800"><span className="text-slate-400 font-normal">Date:</span> {fmtUK(a.date)}</p>
                    {a.notes && <p className="text-slate-500 italic">{a.notes}</p>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </section>

      <section>
        <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center border-b pb-2">
          <I.users className="mr-2" style={{ color: t.primary }} /> Manual handling training
        </h2>
        {upcomingTraining.length === 0 ? (
          <Empty icon={<I.users size={42} />} text="No training scheduled yet." />
        ) : (
          <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
            <ul className="divide-y divide-slate-100">
              {upcomingTraining.map(tr => (
                <li key={tr.id} className="p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                  <div className="flex items-center">
                    {tr.status === 'Completed'
                      ? <span className="text-emerald-500 mr-3"><I.check size={20} /></span>
                      : <span className="text-slate-300 mr-3"><I.circle size={20} /></span>}
                    <div>
                      <p className="font-semibold text-slate-800">{tr.employee}</p>
                      <p className="text-xs text-slate-500">Training date: {fmtUK(tr.date)}</p>
                    </div>
                  </div>
                  <span className={`text-xs font-semibold px-3 py-1 rounded-full self-start sm:self-auto
                    ${tr.status === 'Completed' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                    {tr.status}{tr.status === 'Completed' && tr.expiryDate ? ` • expires ${fmtUK(tr.expiryDate)}` : ''}
                  </span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </section>

      {done.length > 0 && (
        <section>
          <h2 className="text-base font-bold text-slate-700 mb-3 flex items-center">
            <I.check className="mr-2" style={{ color: t.secondary }} /> Completed audits
          </h2>
          <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
            <ul className="divide-y divide-slate-100">
              {done.slice(0,6).map(a => (
                <li key={a.id} className="p-4 flex items-center justify-between opacity-80">
                  <div className="flex items-center">
                    <span className="text-emerald-500 mr-3"><I.check size={18} /></span>
                    <div><p className="font-semibold text-slate-800">{a.site}</p>
                    <p className="text-xs text-slate-500">Foreman: {a.foreman || 'N/A'}</p></div>
                  </div>
                  <span className="text-sm text-slate-600">{fmtUK(a.date)}</span>
                </li>
              ))}
            </ul>
          </div>
        </section>
      )}
    </div>
  );
}

const Empty = ({ icon, text }) => (
  <div className="bg-white border border-slate-200 rounded-lg p-8 text-center text-slate-500 shadow-sm">
    <div className="mx-auto mb-3 text-slate-300 w-fit">{icon}</div>
    <p>{text}</p>
  </div>
);

/* ======================================================================
   PAGE 2  -  AUDIT CHECKS (forms + log + cert)
   ====================================================================== */
function AuditChecksView(props) {
  const { t, theme, isAdmin, sites, employees, audits, training,
          addAudit, deleteAudit, addTraining, completeTraining, deleteTraining,
          addSite, addEmployee, Field, inputCls } = props;

  const [auditForm, setAuditForm] = useState({ site: '', date: '', foreman: '', notes: '' });
  const [trainForm, setTrainForm] = useState({ employee: '', date: todayISO() });
  const [filterDate, setFilterDate] = useState('');
  const [cert, setCert] = useState(null);
  const [showManage, setShowManage] = useState(false);
  const [newSite, setNewSite] = useState('');
  const [newEmp, setNewEmp] = useState('');

  const submitAudit = (e) => {
    e.preventDefault();
    if (!auditForm.site || !auditForm.date) return;
    addAudit(auditForm);
    setAuditForm({ site: '', date: '', foreman: '', notes: '' });
  };
  const submitTraining = (e) => {
    e.preventDefault();
    if (!trainForm.employee || !trainForm.date) return;
    addTraining(trainForm);
    setTrainForm({ employee: '', date: todayISO() });
  };
  const onComplete = async (id) => {
    const rec = await completeTraining(id);
    if (rec) setCert(rec);
  };

  /* filtered logs */
  const fAudits = useMemo(() =>
    [...audits].filter(a => !filterDate || a.date === filterDate)
               .sort((a,b)=>new Date(a.date)-new Date(b.date)), [audits, filterDate]);
  const fTraining = useMemo(() =>
    [...training].filter(r => !filterDate || r.date === filterDate)
                 .sort((a,b)=>new Date(a.date)-new Date(b.date)), [training, filterDate]);

  /* Excel export */
  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const aRows = fAudits.map(a => ({
      Site: a.site, "Planned date": fmtUK(a.date), Foreman: a.foreman || '', Notes: a.notes || '', Status: a.status
    }));
    const tRows = fTraining.map(r => ({
      Employee: r.employee, "Training date": fmtUK(r.date), Status: r.status,
      "Issue date": fmtUK(r.issueDate), "Expiry date": fmtUK(r.expiryDate)
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(aRows.length ? aRows : [{ Site: 'No records' }]), 'Audit Planning');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tRows.length ? tRows : [{ Employee: 'No records' }]), 'Manual Handling');
    const tag = filterDate ? filterDate : 'all';
    XLSX.writeFile(wb, `IFES_Audit_Checks_${tag}.xlsx`);
  };

  const selCls = inputCls;

  return (
    <div className="space-y-8 animate-fade-in">
      <header>
        <h1 className="text-2xl sm:text-3xl font-bold text-slate-900">Audit checks</h1>
        <p className="text-slate-600 mt-1">Plan site audits and log manual handling training. Everyone can view, admins can add.</p>
      </header>

      {!isAdmin && (
        <div className="bg-amber-50 border border-amber-200 text-amber-800 rounded-lg p-4 text-sm flex items-center">
          <I.lock size={18} className="mr-2 shrink-0" />
          You have view access. Log in with the admin password to add audits, training or issue certs.
        </div>
      )}

      {/* ---------- FORMS (admin) ---------- */}
      {isAdmin && (
        <div className="grid gap-6 lg:grid-cols-2">

          {/* Form 1: Audit planning */}
          <form onSubmit={submitAudit} className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
            <div style={{ backgroundColor: t.primary }} className="px-6 py-4">
              <h2 className="text-white font-bold flex items-center"><I.clip className="mr-2" size={20} /> Audit planning</h2>
              <p className="text-white/80 text-xs mt-0.5">Schedule a site audit and who is attending.</p>
            </div>
            <div className="p-6 space-y-4">
              <Field label="Site">
                <select required className={selCls} value={auditForm.site}
                  onChange={(e)=>setAuditForm({...auditForm, site: e.target.value})}>
                  <option value="">Select a site...</option>
                  {sites.map((s,i)=><option key={i} value={s}>{s}</option>)}
                </select>
              </Field>
              <Field label="Date attending">
                <input type="date" required className={selCls} value={auditForm.date}
                  onChange={(e)=>setAuditForm({...auditForm, date: e.target.value})} />
              </Field>
              <Field label="Foreman" hint="(optional)">
                <input type="text" className={selCls} placeholder="e.g. Christy O'Donovan" value={auditForm.foreman}
                  onChange={(e)=>setAuditForm({...auditForm, foreman: e.target.value})} />
              </Field>
              <Field label="Notes" hint="(optional)">
                <input type="text" className={selCls} placeholder="What is being checked" value={auditForm.notes}
                  onChange={(e)=>setAuditForm({...auditForm, notes: e.target.value})} />
              </Field>
              <button type="submit" style={{ backgroundColor: t.secondary }}
                className="w-full text-white font-bold py-3 rounded-lg hover:brightness-95 transition flex justify-center items-center">
                <I.plus className="mr-2" size={18} /> Add audit to schedule
              </button>
            </div>
          </form>

          {/* Form 2: Manual handling training */}
          <form onSubmit={submitTraining} className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
            <div style={{ backgroundColor: t.primary }} className="px-6 py-4">
              <h2 className="text-white font-bold flex items-center"><I.users className="mr-2" size={20} /> Manual handling training</h2>
              <p className="text-white/80 text-xs mt-0.5">Book an employee in. Mark complete below to issue the cert.</p>
            </div>
            <div className="p-6 space-y-4">
              <Field label="Employee">
                <select required className={selCls} value={trainForm.employee}
                  onChange={(e)=>setTrainForm({...trainForm, employee: e.target.value})}>
                  <option value="">Select an employee...</option>
                  {employees.map((s,i)=><option key={i} value={s}>{s}</option>)}
                </select>
              </Field>
              <Field label="Training date">
                <input type="date" required className={selCls} value={trainForm.date}
                  onChange={(e)=>setTrainForm({...trainForm, date: e.target.value})} />
              </Field>
              <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-500">
                Certs are valid for 3 years. When you mark training complete, the certificate is generated and emailed to the office automatically.
              </div>
              <button type="submit" style={{ backgroundColor: t.secondary }}
                className="w-full text-white font-bold py-3 rounded-lg hover:brightness-95 transition flex justify-center items-center">
                <I.plus className="mr-2" size={18} /> Book training
              </button>
            </div>
          </form>
        </div>
      )}

      {/* ---------- Manage lists (admin) ---------- */}
      {isAdmin && (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm">
          <button onClick={()=>setShowManage(!showManage)}
            className="w-full flex items-center justify-between px-6 py-4 text-slate-700 font-semibold">
            <span className="flex items-center"><I.gear className="mr-2" size={18} /> Manage sites and employees</span>
            <I.down size={18} className={`transition ${showManage ? 'rotate-180' : ''}`} />
          </button>
          {showManage && (
            <div className="px-6 pb-6 grid gap-6 sm:grid-cols-2 border-t border-slate-100 pt-5">
              <div>
                <p className="text-sm font-semibold text-slate-700 mb-2">Add a site</p>
                <div className="flex gap-2">
                  <input className={inputCls} placeholder="New site name" value={newSite}
                    onChange={(e)=>setNewSite(e.target.value)} />
                  <button onClick={()=>{ addSite(newSite); setNewSite(''); }} style={{ backgroundColor: t.primary }}
                    className="text-white px-4 rounded-lg font-semibold shrink-0">Add</button>
                </div>
                <p className="text-xs text-slate-400 mt-2">{sites.length} sites in the list.</p>
              </div>
              <div>
                <p className="text-sm font-semibold text-slate-700 mb-2">Add an employee</p>
                <div className="flex gap-2">
                  <input className={inputCls} placeholder="New employee name" value={newEmp}
                    onChange={(e)=>setNewEmp(e.target.value)} />
                  <button onClick={()=>{ addEmployee(newEmp); setNewEmp(''); }} style={{ backgroundColor: t.primary }}
                    className="text-white px-4 rounded-lg font-semibold shrink-0">Add</button>
                </div>
                <p className="text-xs text-slate-400 mt-2">{employees.length} employees in the list.</p>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ---------- VIEWABLE LOG ---------- */}
      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div className="px-4 sm:px-6 py-4 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <h2 className="font-bold text-slate-800 flex items-center"><I.cal2 className="mr-2" style={{ color: t.primary }} size={20} /> Site and training log</h2>
          <div className="flex flex-wrap items-center gap-2">
            <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
              <I.filter size={15} className="text-slate-400" />
              <input type="date" value={filterDate} onChange={(e)=>setFilterDate(e.target.value)}
                className="bg-transparent text-sm focus:outline-none text-slate-700" />
              {filterDate && <button onClick={()=>setFilterDate('')} className="text-slate-400 hover:text-slate-700"><I.x size={15} /></button>}
            </div>
            <button onClick={exportExcel} style={{ backgroundColor: t.primary }}
              className="flex items-center text-white text-sm font-semibold px-3 py-2 rounded-lg hover:brightness-110 transition">
              <I.down size={16} className="mr-1.5" /> Export Excel
            </button>
          </div>
        </div>

        <div className="p-4 sm:p-6 space-y-8">
          {/* Audit log */}
          <div>
            <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wide mb-3">Audit planning {filterDate && `• ${fmtUK(filterDate)}`}</h3>
            <LogTable
              cols={["Site","Date","Foreman","Notes","Status",""]}
              rows={fAudits}
              empty="No audits for this view."
              render={(a)=>(
                <tr key={a.id} className="border-t border-slate-100 hover:bg-slate-50">
                  <td className="px-3 py-2 font-medium text-slate-800">{a.site}</td>
                  <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{fmtUK(a.date)}</td>
                  <td className="px-3 py-2 text-slate-600">{a.foreman || '-'}</td>
                  <td className="px-3 py-2 text-slate-500">{a.notes || '-'}</td>
                  <td className="px-3 py-2"><Badge ok={a.status==='Completed'}>{a.status}</Badge></td>
                  <td className="px-3 py-2 text-right">
                    {isAdmin && <button onClick={()=>deleteAudit(a.id)} className="text-slate-300 hover:text-red-500"><I.trash size={16} /></button>}
                  </td>
                </tr>
              )}
            />
          </div>

          {/* Training log */}
          <div>
            <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wide mb-3">Manual handling training {filterDate && `• ${fmtUK(filterDate)}`}</h3>
            <LogTable
              cols={["Employee","Training date","Status","Expiry","Cert",""]}
              rows={fTraining}
              empty="No training for this view."
              render={(r)=>(
                <tr key={r.id} className="border-t border-slate-100 hover:bg-slate-50">
                  <td className="px-3 py-2 font-medium text-slate-800">{r.employee}</td>
                  <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{fmtUK(r.date)}</td>
                  <td className="px-3 py-2"><Badge ok={r.status==='Completed'}>{r.status}</Badge></td>
                  <td className="px-3 py-2 text-slate-600 whitespace-nowrap">{r.expiryDate ? fmtUK(r.expiryDate) : '-'}</td>
                  <td className="px-3 py-2">
                    {r.status === 'Completed'
                      ? <button onClick={()=>setCert(r)} style={{ color: t.primary }} className="text-sm font-semibold hover:underline flex items-center"><I.file size={15} className="mr-1" /> View cert</button>
                      : (isAdmin
                          ? <button onClick={()=>onComplete(r.id)} className="text-sm font-semibold text-emerald-600 hover:underline flex items-center"><I.check size={15} className="mr-1" /> Mark complete</button>
                          : <span className="text-slate-400 text-sm">Pending</span>)}
                  </td>
                  <td className="px-3 py-2 text-right">
                    {isAdmin && <button onClick={()=>deleteTraining(r.id)} className="text-slate-300 hover:text-red-500"><I.trash size={16} /></button>}
                  </td>
                </tr>
              )}
            />
          </div>
        </div>
      </div>

      {cert && <CertModal cert={cert} theme={theme} onClose={()=>setCert(null)} />}
    </div>
  );
}

const Badge = ({ ok, children }) => (
  <span className={`text-xs font-semibold px-2.5 py-1 rounded-full whitespace-nowrap
    ${ok ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{children}</span>
);

function LogTable({ cols, rows, render, empty }) {
  if (!rows.length) return <p className="text-sm text-slate-400 italic px-1 py-3">{empty}</p>;
  return (
    <div className="overflow-x-auto rounded-lg border border-slate-100">
      <table className="w-full text-sm">
        <thead className="bg-slate-50 text-slate-500">
          <tr>{cols.map((c,i)=><th key={i} className="px-3 py-2 text-left font-semibold">{c}</th>)}</tr>
        </thead>
        <tbody>{rows.map(render)}</tbody>
      </table>
    </div>
  );
}

/* ======================================================================
   CERTIFICATE (matches the attached docx)
   ====================================================================== */
function CertModal({ cert, theme, onClose }) {
  const t = THEMES[theme];
  const issue = cert.issueDate || todayISO();
  const expiry = cert.expiryDate || addYears(cert.date, 3);

  return (
    <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-3 z-50 no-print">
      <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full flex flex-col max-h-[96vh]">
        <div id="cert-print" className="p-6 sm:p-10 overflow-y-auto" style={{ borderTop: `12px solid ${t.primary}` }}>

          {/* header */}
          <div className="flex justify-between items-start mb-6 pb-5 border-b-2" style={{ borderColor: t.primary }}>
            <Logo theme={theme} className="h-14 object-contain" />
            <div className="text-right">
              <p className="text-[11px] uppercase tracking-widest text-slate-400 font-semibold">Certificate of Completion</p>
              <h1 className="font-serif-cert text-3xl sm:text-4xl font-bold" style={{ color: t.primary }}>Manual Handling</h1>
            </div>
          </div>

          {/* body */}
          <div className="flex gap-6 items-start">
            <div className="flex-1">
              <p className="text-slate-600">This certifies that</p>
              <p className="font-serif-cert text-3xl sm:text-4xl font-bold text-slate-900 my-2"
                 style={{ borderBottom: `2px solid ${t.secondary}`, display: 'inline-block', paddingBottom: 4 }}>
                {cert.employee}
              </p>
              <p className="text-slate-700 leading-relaxed mt-3">
                Has successfully completed the theory and practical manual handling training course. The cert is valid for 3 years.
              </p>
              <p className="mt-4 text-slate-800"><span className="text-slate-400 text-sm uppercase tracking-wide font-semibold">Training date</span><br/>
                <span className="text-lg font-semibold">{fmtUK(cert.date)}</span></p>
            </div>
            <div className="shrink-0 hidden sm:block"><GoldSeal size={110} /></div>
          </div>

          {/* signature + dates */}
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mt-10 pt-6 border-t border-slate-200 gap-6">
            <div>
              <p className="font-serif-cert text-xl text-slate-800" style={{ fontStyle: 'italic' }}>{CONFIG.INSTRUCTOR.name}</p>
              <div className="border-b border-slate-700 w-48 my-1" />
              <p className="text-sm font-semibold text-slate-700">{CONFIG.INSTRUCTOR.title}</p>
              <p className="text-xs text-slate-500">{CONFIG.INSTRUCTOR.qual}</p>
            </div>
            <div className="text-sm text-slate-600 sm:text-right space-y-1">
              <p><span className="text-slate-400">Issue date:</span> <b className="text-slate-800">{fmtUK(issue)}</b></p>
              <p><span className="text-slate-400">Expiry date:</span> <b className="text-slate-800">{fmtUK(expiry)}</b></p>
              <p className="text-[11px] text-slate-400">Ref: {certRef(theme, cert.id)}</p>
            </div>
          </div>
        </div>

        {/* actions */}
        <p className="px-4 pt-3 text-xs text-slate-500 no-print">A signed PDF copy is emailed to the office automatically when training is completed.</p>
        <div className="bg-slate-100 p-4 flex flex-col sm:flex-row justify-end gap-3 border-t border-slate-200 no-print">
          <button onClick={onClose} className="px-5 py-2.5 text-slate-600 bg-white border border-slate-300 rounded-lg font-semibold hover:bg-slate-50">Close</button>
          <button onClick={()=>window.print()} style={{ backgroundColor: t.primary }}
            className="px-5 py-2.5 text-white rounded-lg font-semibold hover:brightness-110 flex items-center justify-center">
            <I.file size={18} className="mr-2" /> Print / Save PDF
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  /* Register the service worker so the app installs and works offline.
     Harmless if sw.js is missing (e.g. in a preview) - it just no-ops. */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>
</body>
</html>
