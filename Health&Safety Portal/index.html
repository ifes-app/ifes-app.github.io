<script>
/* If startup fails, show the error instead of a white screen */
window.addEventListener('error', function(e){
  var root = document.getElementById('root');
  if (root && !root.hasChildNodes()){
    root.innerHTML = '<pre style="padding:20px;color:#b00020;white-space:pre-wrap;'
      + 'font:13px/1.5 ui-monospace,Menlo,monospace">Startup error:\n\n'
      + ((e && (e.message || e.error)) || 'unknown') + '\n\nOpen the browser console (F12) for detail.</pre>';
  }
});
</script>

const store = {
  get(k){ try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } },
  set(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} },
  del(k){ try { localStorage.removeItem(k); } catch(e){} }
};
const SESS = 'ifes_tsg_session';

const todayISO = () => new Date().toISOString().slice(0,10);
const addYears = (iso, n) => { const d = new Date(iso); d.setFullYear(d.getFullYear()+n); return d.toISOString().slice(0,10); };
const fmtUK = (iso) => { if(!iso) return ''; const d = new Date(iso); if(isNaN(d)) return String(iso);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }); };
const daysUntil = (iso) => { if(!iso) return null; return Math.ceil((new Date(iso) - new Date())/86400000); };
const genPassword = () => {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
  let s=''; for(let i=0;i<8;i++) s+=c[Math.floor(Math.random()*c.length)]; return s;
};

async function api(action, payload){
  let res;
  try {
    res = await fetch(backendUrl(), {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action }, payload))
    });
  } catch(e){ throw { code:'network' }; }
  try { return await res.json(); }
  catch(e){ throw { code:'bad_endpoint' }; }   // usually a wrong access code
}

/* Fill the exact certificate in the browser. Returns { blob, base64 }. */
function buildCert(data){
  const bin = atob(TEMPLATE_B64);
  const bytes = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  const zip = new PizZip(bytes);
  const Docx = (window.docxtemplater && window.docxtemplater.default) ? window.docxtemplater.default : window.docxtemplater;
  const doc = new Docx(zip, { paragraphLoop:true, linebreaks:true });
  doc.render({
    employeeName: data.name,
    trainingDate: fmtUK(data.trainingDate),
    issueDate: fmtUK(data.issueDate),
    expiryDate: fmtUK(data.expiryDate)
  });
  const blob = doc.getZip().generate({ type:'blob',
    mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  return blob;
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1]);
    r.onerror = reject; r.readAsDataURL(blob);
  });
}

/* ======================================================================
   APP
   ====================================================================== */
function App(){
  const [theme, setTheme] = useState(store.get('theme') || CONFIG.DEFAULT_THEME);
  const t = THEMES[theme];
  useEffect(()=>store.set('theme', theme), [theme]);

  const [ready, setReady] = useState(false);
  const [me, setMe] = useState(null);          // {username, name, role, token}
  const [tab, setTab] = useState('dashboard');

  const [users, setUsers] = useState([]);
  const [training, setTraining] = useState([]);
  const [busy, setBusy] = useState(false);

  const isAdmin = me && (me.role === 'admin' || me.role === 'superadmin');

  /* resume session */
  useEffect(()=>{ (async()=>{
    const sess = store.get(SESS);
    if (sess && sess.token && backendReady()){
      try { const r = await api('session', { token: sess.token });
        if (r.ok){ setMe(Object.assign({ token: sess.token }, r)); }
        else store.del(SESS);
      } catch(e){}
    }
    setReady(true);
  })(); }, []);

  const loadData = async (token) => {
    const tk = token || (me && me.token);
    if (!tk) return;
    try {
      const tr = await api('listTraining', { token: tk });
      if (tr.ok) setTraining(tr.training);
      const u = await api('listUsers', { token: tk });
      if (u.ok) setUsers(u.users);
    } catch(e){}
  };
  useEffect(()=>{ if (me) loadData(me.token); }, [me]);

  const onLogin = (data) => { store.set(SESS, { token: data.token }); setMe(data); setTab(data.role==='user'?'mine':'dashboard'); };
  const logout = () => { store.del(SESS); setMe(null); setUsers([]); setTraining([]); };

  if (!ready) return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading...</div>;
  if (!me) return <Login t={t} theme={theme} setTheme={setTheme} onLogin={onLogin} />;

  const NavBtn = ({id, icon, label}) => (
    <button onClick={()=>setTab(id)}
      style={{ backgroundColor: tab===id ? t.secondary : 'transparent' }}
      className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition ${tab===id?'text-white shadow-sm':'text-white/80 hover:bg-white/10'}`}>
      {icon} <span className="hidden sm:inline">{label}</span>
    </button>
  );

  return (
    <div className="min-h-screen" style={{ backgroundColor: t.lightBg }}>
      <header className="bg-white border-b border-slate-200 shadow-sm">
        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
          <button onClick={()=>setTheme(theme==='ifes'?'tsg':'ifes')} title="Switch theme"
            className="flex items-center gap-2 font-extrabold text-lg" style={{ color: t.primary }}>
            <span style={{ background:t.primary }} className="text-white w-8 h-8 rounded-lg flex items-center justify-center">{t.name[0]}</span>
            {t.name} <span className="text-slate-400 font-medium text-sm">H&amp;S Portal</span>
          </button>
          <div className="flex items-center gap-3">
            <span className="hidden sm:flex items-center gap-2 text-sm text-slate-600"><I.user size={16}/> {me.name} <Badge tone="blue">{roleLabel(me.role)}</Badge></span>
            <button onClick={logout} className="flex items-center gap-1 text-slate-500 hover:text-slate-800 text-sm font-medium"><I.out size={16}/> Log out</button>
          </div>
        </div>
      </header>

      <nav style={{ backgroundColor: t.primary }} className="text-white shadow">
        <div className="max-w-6xl mx-auto px-4 flex gap-2 h-12 items-center">
          {isAdmin && <NavBtn id="dashboard" icon={<I.grid size={17}/>} label="Dashboard" />}
          {isAdmin && <NavBtn id="training" icon={<I.clip size={17}/>} label="Training" />}
          {isAdmin && <NavBtn id="people" icon={<I.users size={17}/>} label="People" />}
          {!isAdmin && <NavBtn id="mine" icon={<I.cert size={17}/>} label="My training" />}
        </div>
      </nav>

      <main className="max-w-6xl mx-auto px-4 py-8">
        {tab==='dashboard' && isAdmin && <Dashboard t={t} training={training} />}
        {tab==='training' && isAdmin && <Training t={t} me={me} users={users} training={training} reload={()=>loadData()} busy={busy} setBusy={setBusy} />}
        {tab==='people' && isAdmin && <People t={t} me={me} users={users} reload={()=>loadData()} />}
        {tab==='mine' && !isAdmin && <MyTraining t={t} training={training} />}
      </main>
    </div>
  );
}

/* ---------------- Login ---------------- */
function Login({ t, theme, setTheme, onLogin }){
  const [username, setU] = useState('');
  const [password, setP] = useState('');
  const [code, setCode] = useState('');
  const [needCode, setNeedCode] = useState(!backendReady());
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);
  const submit = async (e) => {
    e.preventDefault(); setErr(''); setBusy(true);
    try {
      if (CONFIG.BACKEND_PREFIX.indexOf('http') !== 0){ setErr('Backend not set up in the app yet.'); setBusy(false); return; }
      if (needCode){
        if (!code.trim()){ setErr('Enter your access code.'); setBusy(false); return; }
        BACKEND_CODE = code.trim();
      }
      const r = await api('login', { username: username.trim(), password });
      if (r.ok){
        store.set('backend_code', BACKEND_CODE);   // remember the code on this device
        onLogin({ username:r.username, name:r.name, role:r.role, token:r.token });
      } else {
        setErr('Wrong username or password.');
      }
    } catch(e){
      if (e && e.code === 'bad_endpoint'){ setErr('That access code does not match. Check the last 12 characters.'); if(needCode) BACKEND_CODE=''; }
      else setErr('Could not reach the server. Check your internet.');
    }
    finally { setBusy(false); }
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{ backgroundColor: t.lightBg }}>
      <form onSubmit={submit} className="w-full max-w-sm bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden fade">
        <div style={{ backgroundColor: t.primary }} className="px-8 py-8 text-center text-white">
          <button type="button" onClick={()=>setTheme(theme==='ifes'?'tsg':'ifes')} className="text-2xl font-extrabold">{t.name}</button>
          <p className="text-white/80 text-sm mt-1">Health &amp; Safety Portal</p>
        </div>
        <div className="p-8 space-y-4">
          {needCode && (
            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-1">Access code <span className="font-normal text-slate-400">(first time on this device)</span></label>
              <input value={code} onChange={e=>setCode(e.target.value)} placeholder="12-character code"
                className="w-full border border-slate-300 rounded-lg px-3 py-2.5 font-mono focus:ring-2 focus:outline-none" style={{ '--tw-ring-color':t.primary }} />
            </div>
          )}
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-1">Username</label>
            <input autoFocus value={username} onChange={e=>setU(e.target.value)}
              className="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:outline-none" style={{ '--tw-ring-color':t.primary }} />
          </div>
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-1">Password</label>
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><I.lock size={17}/></span>
              <input type="password" value={password} onChange={e=>setP(e.target.value)}
                className="w-full border border-slate-300 rounded-lg pl-9 pr-3 py-2.5 focus:ring-2 focus:outline-none" style={{ '--tw-ring-color':t.primary }} />
            </div>
          </div>
          {err && <p className="text-sm text-red-600 font-medium">{err}</p>}
          {!needCode && <button type="button" onClick={()=>{ setNeedCode(true); }} className="text-xs text-slate-400 underline">Use a different access code</button>}
          <button disabled={busy} style={{ backgroundColor: t.secondary }}
            className="w-full text-white font-bold py-2.5 rounded-lg hover:brightness-95 transition disabled:opacity-60">
            {busy?'Signing in...':'Sign in'}
          </button>
        </div>
      </form>
    </div>
  );
}

/* ---------------- Dashboard ---------------- */
function certState(row){
  if (row.status !== 'Completed' || !row.expiryDate) return { key:'scheduled', tone:'slate', label:'Scheduled' };
  const d = daysUntil(row.expiryDate);
  if (d < 0) return { key:'expired', tone:'red', label:'Expired' };
  if (d <= 90) return { key:'soon', tone:'amber', label:'Expiring soon' };
  return { key:'valid', tone:'green', label:'Valid' };
}
function Dashboard({ t, training }){
  const [filter, setFilter] = useState('');
  const rows = training.map(r => Object.assign({}, r, { st: certState(r) }));
  const count = (k) => rows.filter(r=>r.st.key===k).length;
  const shown = rows.filter(r => !filter || String(r.name).toLowerCase().includes(filter.toLowerCase()))
                    .sort((a,b)=> (a.expiryDate||'').localeCompare(b.expiryDate||''));
  const cards = [
    { k:'valid', label:'Valid', tone:'text-emerald-600' },
    { k:'soon', label:'Expiring soon (90 days)', tone:'text-amber-600' },
    { k:'expired', label:'Expired', tone:'text-red-600' },
    { k:'scheduled', label:'Scheduled', tone:'text-slate-500' }
  ];
  return (
    <div className="space-y-6 fade">
      <h1 className="text-2xl font-bold text-slate-900">Certificate dashboard</h1>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {cards.map(c=>(
          <div key={c.k} className="bg-white rounded-xl border border-slate-200 p-5">
            <p className={`text-3xl font-extrabold ${c.tone}`}>{count(c.k)}</p>
            <p className="text-sm text-slate-500 mt-1">{c.label}</p>
          </div>
        ))}
      </div>
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="p-4 border-b border-slate-100 flex items-center justify-between gap-3">
          <h2 className="font-bold text-slate-800">All records ({rows.length})</h2>
          <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Filter by name"
            className="border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none" />
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-500 text-left">
              <tr><th className="px-4 py-2 font-semibold">Name</th><th className="px-4 py-2 font-semibold">Training date</th><th className="px-4 py-2 font-semibold">Expires</th><th className="px-4 py-2 font-semibold">Status</th></tr>
            </thead>
            <tbody>
              {shown.length===0 && <tr><td colSpan="4" className="px-4 py-6 text-center text-slate-400 italic">Nothing to show yet.</td></tr>}
              {shown.map(r=>(
                <tr key={r.id} className="border-t border-slate-100">
                  <td className="px-4 py-2.5 font-medium text-slate-800">{r.name}</td>
                  <td className="px-4 py-2.5 text-slate-600">{fmtUK(r.trainingDate)||'-'}</td>
                  <td className="px-4 py-2.5 text-slate-600">{fmtUK(r.expiryDate)||'-'}</td>
                  <td className="px-4 py-2.5"><Badge tone={r.st.tone}>{r.st.label}</Badge></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Training ---------------- */
function Training({ t, users, training, reload, busy, setBusy }){
  const [uname, setUname] = useState('');
  const [date, setDate] = useState(todayISO());
  const [msg, setMsg] = useState(null);

  const schedule = async (e) => {
    e.preventDefault(); setMsg(null);
    if (!uname){ setMsg({bad:true,text:'Pick a person.'}); return; }
    setBusy(true);
    const tk = store.get(SESS).token;
    const r = await api('scheduleTraining', { token: tk, username: uname, date });
    setBusy(false);
    if (r.ok){ setMsg({bad:false,text:'Training scheduled.'}); setUname(''); reload(); }
    else setMsg({bad:true,text:'Could not schedule.'});
  };

  const issue = async (row) => {
    if (!window.confirm('Issue the certificate for '+row.name+'? It will download and be emailed to the trainee and the office.')) return;
    setBusy(true);
    try {
      const issueDate = todayISO();
      const expiryDate = addYears(row.trainingDate || issueDate, 3);
      const data = { name: row.name, trainingDate: row.trainingDate || issueDate, issueDate, expiryDate };
      const blob = buildCert(data);
      downloadBlob(blob, 'Manual_Handling_'+String(row.name).replace(/[^A-Za-z0-9]+/g,'_')+'.docx');
      const b64 = await blobToBase64(blob);
      const tk = store.get(SESS).token;
      const r = await api('completeTraining', { token: tk, id: row.id, trainingDate: data.trainingDate, issueDate, expiryDate, certBase64: b64 });
      if (r.ok){ setMsg({bad:false, text: r.emailed===false ? 'Certificate issued and downloaded (email failed, check Apps Script).' : 'Certificate issued, downloaded and emailed.'}); reload(); }
      else setMsg({bad:true, text:'Saved cert but backend rejected it.'});
    } catch(err){ setMsg({bad:true, text:'Could not build the certificate. Check your internet (the cert library loads online).'}); }
    finally { setBusy(false); }
  };

  const del = async (row) => {
    if (!window.confirm('Delete this training record?')) return;
    const tk = store.get(SESS).token;
    await api('deleteTraining', { token: tk, id: row.id }); reload();
  };

  const sorted = [...training].sort((a,b)=> (a.status==='Scheduled'?0:1)-(b.status==='Scheduled'?0:1) || (b.trainingDate||'').localeCompare(a.trainingDate||''));

  return (
    <div className="space-y-6 fade">
      <h1 className="text-2xl font-bold text-slate-900">Training</h1>

      <form onSubmit={schedule} className="bg-white rounded-xl border border-slate-200 overflow-hidden max-w-2xl">
        <div style={{ backgroundColor:t.primary }} className="px-5 py-3 text-white font-bold flex items-center gap-2"><I.plus size={18}/> Schedule training</div>
        <div className="p-5 grid sm:grid-cols-3 gap-4 items-end">
          <div className="sm:col-span-1">
            <label className="block text-sm font-semibold text-slate-700 mb-1">Person</label>
            <select value={uname} onChange={e=>setUname(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5 bg-white">
              <option value="">Select...</option>
              {users.filter(u=>u.active).map(u=><option key={u.username} value={u.username}>{u.name} ({u.username})</option>)}
            </select>
          </div>
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-1">Training date</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5" />
          </div>
          <button disabled={busy} style={{ backgroundColor:t.secondary }} className="text-white font-bold py-2.5 rounded-lg hover:brightness-95 disabled:opacity-60">Schedule</button>
        </div>
        {msg && <p className={`px-5 pb-4 text-sm font-medium ${msg.bad?'text-red-600':'text-emerald-600'}`}>{msg.text}</p>}
      </form>

      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="p-4 border-b border-slate-100"><h2 className="font-bold text-slate-800">Records ({training.length})</h2></div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-500 text-left">
              <tr><th className="px-4 py-2 font-semibold">Name</th><th className="px-4 py-2 font-semibold">Training date</th><th className="px-4 py-2 font-semibold">Status</th><th className="px-4 py-2 font-semibold text-right">Action</th></tr>
            </thead>
            <tbody>
              {sorted.length===0 && <tr><td colSpan="4" className="px-4 py-6 text-center text-slate-400 italic">No training yet.</td></tr>}
              {sorted.map(r=>{
                const st = certState(r);
                return (
                  <tr key={r.id} className="border-t border-slate-100">
                    <td className="px-4 py-2.5 font-medium text-slate-800">{r.name}</td>
                    <td className="px-4 py-2.5 text-slate-600">{fmtUK(r.trainingDate)||'-'}</td>
                    <td className="px-4 py-2.5"><Badge tone={st.tone}>{st.label}</Badge></td>
                    <td className="px-4 py-2.5">
                      <div className="flex items-center justify-end gap-2">
                        {r.status!=='Completed' && <button onClick={()=>issue(r)} disabled={busy} style={{ backgroundColor:t.primary }} className="text-white text-xs font-semibold px-3 py-1.5 rounded-lg disabled:opacity-60 flex items-center gap-1"><I.cert size={14}/> Issue cert</button>}
                        {r.status==='Completed' && <button onClick={()=>issue(r)} className="text-xs font-semibold px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 flex items-center gap-1"><I.down size={14}/> Re-download</button>}
                        <button onClick={()=>del(r)} className="text-slate-300 hover:text-red-500"><I.trash size={16}/></button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ---------------- People ---------------- */
function People({ t, me, users, reload }){
  const canMakeAdmin = me.role === 'superadmin';
  const [form, setForm] = useState({ username:'', name:'', email:'', role:'user', password:genPassword() });
  const [msg, setMsg] = useState(null);
  const [created, setCreated] = useState(null);
  const [busy, setBusy] = useState(false);
  const [bulkMsg, setBulkMsg] = useState(null);

  const set = (k,v) => setForm(f=>Object.assign({}, f, { [k]:v }));

  const add = async (e) => {
    e.preventDefault(); setMsg(null); setCreated(null); setBusy(true);
    const tk = store.get(SESS).token;
    const r = await api('addUser', { token: tk, user: form });
    setBusy(false);
    if (r.ok){
      setCreated({ username: form.username, password: form.password });
      setForm({ username:'', name:'', email:'', role:'user', password:genPassword() });
      reload();
    } else if (r.error==='exists'){ setMsg({bad:true, text:'That username already exists.'}); }
    else setMsg({bad:true, text:'Could not add user.'});
  };

  const onFile = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setBulkMsg(null);
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data);
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });
      const users2 = rows.map(r=>{
        const low = {}; Object.keys(r).forEach(k=> low[k.toString().trim().toLowerCase()] = r[k]);
        return {
          username: String(low.username||'').trim(),
          name: String(low.name||low.username||'').trim(),
          email: String(low.email||'').trim(),
          role: (String(low.role||'user').trim().toLowerCase()==='admin' && canMakeAdmin) ? 'admin' : 'user',
          password: String(low.password||'').trim() || genPassword()
        };
      }).filter(u=>u.username);
      if (users2.length===0){ setBulkMsg({bad:true, text:'No usable rows. Columns needed: username, name, email, role, password.'}); e.target.value=''; return; }
      const tk = store.get(SESS).token;
      const r = await api('bulkAddUsers', { token: tk, users: users2 });
      if (r.ok){ setBulkMsg({bad:false, text:`Added ${r.added}, skipped ${r.skipped}${r.skipped?' (duplicates or not allowed)':''}.`}); reload(); }
      else setBulkMsg({bad:true, text:'Upload failed.'});
    } catch(err){ setBulkMsg({bad:true, text:'Could not read that file.'}); }
    e.target.value='';
  };

  const del = async (u) => {
    if (!window.confirm('Remove '+u.username+'?')) return;
    const tk = store.get(SESS).token;
    const r = await api('deleteUser', { token: tk, username: u.username });
    if (r.ok) reload(); else alert('Could not remove that user.');
  };

  return (
    <div className="space-y-6 fade">
      <h1 className="text-2xl font-bold text-slate-900">People and access</h1>

      <div className="grid lg:grid-cols-2 gap-6 items-start">
        <form onSubmit={add} className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div style={{ backgroundColor:t.primary }} className="px-5 py-3 text-white font-bold flex items-center gap-2"><I.plus size={18}/> Add one person</div>
          <div className="p-5 space-y-3">
            <div className="grid sm:grid-cols-2 gap-3">
              <div><label className="block text-xs font-semibold text-slate-600 mb-1">Username</label><input required value={form.username} onChange={e=>set('username', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
              <div><label className="block text-xs font-semibold text-slate-600 mb-1">Full name</label><input value={form.name} onChange={e=>set('name', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
            </div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Email (cert goes here)</label><input type="email" value={form.email} onChange={e=>set('email', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
            <div className="grid sm:grid-cols-2 gap-3">
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Access</label>
                <select value={form.role} onChange={e=>set('role', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white">
                  <option value="user">User</option>
                  {canMakeAdmin && <option value="admin">Admin</option>}
                </select>
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                <div className="flex gap-2">
                  <input value={form.password} onChange={e=>set('password', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 font-mono text-sm" />
                  <button type="button" onClick={()=>set('password', genPassword())} className="text-xs text-slate-500 border border-slate-300 rounded-lg px-2">New</button>
                </div>
              </div>
            </div>
            {msg && <p className={`text-sm font-medium ${msg.bad?'text-red-600':'text-emerald-600'}`}>{msg.text}</p>}
            {created && (
              <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm">
                <p className="font-semibold text-emerald-800 flex items-center gap-1"><I.check size={15}/> User created. Give them these details:</p>
                <p className="mt-1 font-mono text-slate-700">Username: {created.username}<br/>Password: {created.password}</p>
              </div>
            )}
            <button disabled={busy} style={{ backgroundColor:t.secondary }} className="w-full text-white font-bold py-2.5 rounded-lg hover:brightness-95 disabled:opacity-60">{busy?'Adding...':'Add person'}</button>
          </div>
        </form>

        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div style={{ backgroundColor:t.primary }} className="px-5 py-3 text-white font-bold flex items-center gap-2"><I.up size={18}/> Bulk upload (Excel)</div>
          <div className="p-5 space-y-3 text-sm text-slate-600">
            <p>Upload a spreadsheet with columns: <b>username, name, email, role, password</b>. Missing passwords are generated. {canMakeAdmin ? 'Role admin is allowed.' : 'Everyone is added as a user.'}</p>
            <label className="flex items-center justify-center gap-2 border-2 border-dashed border-slate-300 rounded-lg py-6 cursor-pointer hover:border-slate-400" style={{ color:t.primary }}>
              <I.up size={18}/> <span className="font-semibold">Choose .xlsx or .csv</span>
              <input type="file" accept=".xlsx,.xls,.csv" onChange={onFile} className="hidden" />
            </label>
            {bulkMsg && <p className={`font-medium ${bulkMsg.bad?'text-red-600':'text-emerald-600'}`}>{bulkMsg.text}</p>}
          </div>
        </div>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="p-4 border-b border-slate-100"><h2 className="font-bold text-slate-800">Everyone ({users.length})</h2></div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-500 text-left"><tr><th className="px-4 py-2 font-semibold">Name</th><th className="px-4 py-2 font-semibold">Username</th><th className="px-4 py-2 font-semibold">Email</th><th className="px-4 py-2 font-semibold">Access</th><th className="px-4 py-2"></th></tr></thead>
            <tbody>
              {users.map(u=>(
                <tr key={u.username} className="border-t border-slate-100">
                  <td className="px-4 py-2.5 font-medium text-slate-800">{u.name}</td>
                  <td className="px-4 py-2.5 text-slate-600 font-mono text-xs">{u.username}</td>
                  <td className="px-4 py-2.5 text-slate-600">{u.email||'-'}</td>
                  <td className="px-4 py-2.5"><Badge tone={u.role==='superadmin'?'blue':u.role==='admin'?'green':'slate'}>{roleLabel(u.role)}</Badge></td>
                  <td className="px-4 py-2.5 text-right">{u.username!==me.username && <button onClick={()=>del(u)} className="text-slate-300 hover:text-red-500"><I.trash size={16}/></button>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ---------------- My training (user) ---------------- */
function MyTraining({ t, training }){
  const download = (row) => {
    const blob = buildCert({ name: row.name, trainingDate: row.trainingDate, issueDate: row.issueDate, expiryDate: row.expiryDate });
    downloadBlob(blob, 'Manual_Handling_'+String(row.name).replace(/[^A-Za-z0-9]+/g,'_')+'.docx');
  };
  return (
    <div className="space-y-6 fade">
      <h1 className="text-2xl font-bold text-slate-900">My training</h1>
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        {training.length===0 && <p className="p-6 text-slate-400 italic">Nothing scheduled yet.</p>}
        <ul className="divide-y divide-slate-100">
          {training.map(r=>{
            const st = certState(r);
            return (
              <li key={r.id} className="p-4 flex items-center justify-between">
                <div>
                  <p className="font-semibold text-slate-800">Manual Handling</p>
                  <p className="text-sm text-slate-500">Training {fmtUK(r.trainingDate)||'TBC'} {r.expiryDate && `- expires ${fmtUK(r.expiryDate)}`}</p>
                </div>
                <div className="flex items-center gap-3">
                  <Badge tone={st.tone}>{st.label}</Badge>
                  {r.status==='Completed' && <button onClick={()=>download(r)} style={{ backgroundColor:t.primary }} className="text-white text-sm font-semibold px-3 py-1.5 rounded-lg flex items-center gap-1"><I.down size={15}/> Certificate</button>}
                </div>
              </li>
            );
          })}
        </ul>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
