<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IFES Health &amp; Safety Portal</title>
<link rel="icon" href="https://www.tsg-solutions.com/wp-content/uploads/2026/01/ifes-logo-v3-204x300-1.webp" />

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.50.0/build/docxtemplater.js"></script>
<style>@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.fade{animation:fade .25s ease-out}</style>
</head>
<body>
<div id="root"></div>

<script>
window.addEventListener('error', function(e){
  var r=document.getElementById('root');
  if(r && !r.hasChildNodes()){ r.innerHTML='<pre style="padding:20px;color:#b00020;white-space:pre-wrap;font:13px/1.5 ui-monospace,Menlo,monospace">Startup error:\n\n'+((e&&(e.message||e.error))||'unknown')+'\n\nOpen the console (F12) for detail.</pre>'; }
});
</script>

<script type="text/plain" id="appsrc">
/* eslint-disable */
const { useState, useEffect } = React;

/* ===== CONFIG =====
   Split your Apps Script /exec URL: put everything except the last 12
   characters of the long code into BACKEND_PREFIX. The last 12 characters
   are the ACCESS CODE staff type once on each device. */
const CONFIG = {
  BACKEND_PREFIX: "https://script.google.com/macros/s/AKfycbzy5Z4XF0z9Q7KnuO7TDgS23cWj3lX1dyOTiw81KC09fxZAkFZShjzRUZ",
  LOGO_URL: "https://www.tsg-solutions.com/wp-content/uploads/2026/01/ifes-logo-v3-204x300-1.webp",
  CERT_FILE: "Cert.txt",
  /* Training type prints on the certificate. Add more names any time. */
  TRAINING_TYPES: [ "Manual Handling" ],
  /* The instructor shown on every certificate. Edit here if it changes. */
  INSTRUCTOR: { name: "Cormac Farrell", title: "Manual Handling Instructor", qual: "QQI Level 6" }
};
const THEME = { primary:'#005C9C', secondary:'#0077C8', lightBg:'#F1F6FA' };

const store = {
  get(k){ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} },
  del(k){ try{localStorage.removeItem(k);}catch(e){} }
};
const SESS='ifes_session';
let BACKEND_CODE=(function(){ try{return JSON.parse(localStorage.getItem('backend_code'))||'';}catch(e){return '';} })();
const backendReady=()=>BACKEND_CODE.length>0;
const backendUrl=()=>CONFIG.BACKEND_PREFIX+BACKEND_CODE+"/exec";

const todayISO=()=>new Date().toISOString().slice(0,10);
const addYears=(iso,n)=>{ const d=new Date(iso); d.setFullYear(d.getFullYear()+n); return d.toISOString().slice(0,10); };
const fmtUK=(iso)=>{ if(!iso)return ''; const d=new Date(iso); if(isNaN(d))return String(iso); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); };
const daysUntil=(iso)=>{ if(!iso)return null; return Math.ceil((new Date(iso)-new Date())/86400000); };
const genPassword=()=>{ const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789'; let s=''; for(let i=0;i<8;i++)s+=c[Math.floor(Math.random()*c.length)]; return s; };
const safeName=(n)=>String(n).replace(/[^A-Za-z0-9]+/g,'_');

async function api(action,payload){
  let res;
  try{ res=await fetch(backendUrl(),{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({action},payload))}); }
  catch(e){ throw {code:'network'}; }
  try{ return await res.json(); }catch(e){ throw {code:'bad_endpoint'}; }
}

/* ---- certificate loading + filling (cert lives in Cert.txt, not in this file) ---- */
const CERT_CACHE={};
async function loadCert(file){
  if(CERT_CACHE[file]) return CERT_CACHE[file];
  const r=await fetch(file);
  if(!r.ok) throw {message:'Could not load '+file+' (make sure it sits next to index.html on the host).'};
  CERT_CACHE[file]=(await r.text()).replace(/\s+/g,'');
  return CERT_CACHE[file];
}
function buildCertBytes(b64,data){
  const bin=atob(b64); const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const zip=new PizZip(bytes);
  const Docx=(window.docxtemplater&&window.docxtemplater.default)?window.docxtemplater.default:window.docxtemplater;
  const doc=new Docx(zip,{paragraphLoop:true,linebreaks:true});
  doc.render({ employeeName:data.name, trainingType:data.trainingType||'', trainingTypeLower:(data.trainingType||'').toLowerCase(), trainingDate:fmtUK(data.trainingDate), issueDate:fmtUK(data.issueDate), expiryDate:fmtUK(data.expiryDate), instructorName:CONFIG.INSTRUCTOR.name, instructorTitle:CONFIG.INSTRUCTOR.title, instructorQual:CONFIG.INSTRUCTOR.qual });
  return doc.getZip().generate({type:'uint8array'});
}
function uint8ToBase64(u8){ let s=''; const chunk=0x8000; for(let i=0;i<u8.length;i+=chunk){ s+=String.fromCharCode.apply(null,u8.subarray(i,i+chunk)); } return btoa(s); }
function downloadBlob(blob,filename){ const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500); }
const DOCX_MIME='application/vnd.openxmlformats-officedocument.wordprocessingml.document';
function downloadCerts(outputs){
  if(outputs.length===1){ downloadBlob(new Blob([outputs[0].bytes],{type:DOCX_MIME}), outputs[0].name); return; }
  const zip=new PizZip(); outputs.forEach(o=>zip.file(o.name,o.bytes));
  downloadBlob(zip.generate({type:'blob'}),'Certificates.zip');
}

/* ---- icons ---- */
const I={
  grid:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  cert:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="12" rx="1"/><circle cx="12" cy="18" r="2.5"/><path d="M10.5 20L9 23l3-1.5L15 23l-1.5-3"/></svg>,
  users:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 3-5 6.5-5s6.5 1.7 6.5 5"/><path d="M17 5a3 3 0 010 6M18 20c0-2.2-1-3.7-2.5-4.6"/></svg>,
  user:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>,
  plus:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>,
  up:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 20h16"/></svg>,
  down:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 4v12M7 11l5 5 5-5"/><path d="M4 20h16"/></svg>,
  out:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>,
  trash:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>,
  lock:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg>,
  check:(p)=><svg {...p} width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 6L9 17l-5-5"/></svg>
};
const roleLabel=(r)=> r==='superadmin'?'Super admin':r==='admin'?'Admin':'Trainer';
const Badge=({children,tone})=>{ const m={green:'bg-emerald-100 text-emerald-700',amber:'bg-amber-100 text-amber-700',red:'bg-red-100 text-red-700',slate:'bg-slate-100 text-slate-600',blue:'bg-sky-100 text-sky-700'}; return <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${m[tone]||m.slate}`}>{children}</span>; };
const Logo=({className})=> <img src={CONFIG.LOGO_URL} alt="IFES" className={className} onError={(e)=>{e.target.style.display='none';}} />;

/* ===================== APP ===================== */
function App(){
  const t=THEME;
  const [ready,setReady]=useState(false);
  const [me,setMe]=useState(null);
  const [tab,setTab]=useState('give');
  const [users,setUsers]=useState([]);
  const [employees,setEmployees]=useState([]);
  const [training,setTraining]=useState([]);
  const [showPw,setShowPw]=useState(false);
  const isAdmin=me&&(me.role==='admin'||me.role==='superadmin');

  useEffect(()=>{ (async()=>{
    const sess=store.get(SESS);
    if(sess&&sess.token&&backendReady()){
      try{ const r=await api('session',{token:sess.token}); if(r.ok) setMe(Object.assign({token:sess.token},r)); else store.del(SESS); }catch(e){}
    }
    setReady(true);
  })(); },[]);

  const loadData=async()=>{
    const tk=me&&me.token; if(!tk)return;
    try{
      const e=await api('listEmployees',{token:tk}); if(e.ok)setEmployees(e.employees);
      const tr=await api('listTraining',{token:tk}); if(tr.ok)setTraining(tr.training);
      if(me.role==='admin'||me.role==='superadmin'){ const u=await api('listUsers',{token:tk}); if(u.ok)setUsers(u.users); }
    }catch(e){}
  };
  useEffect(()=>{ if(me){ setTab(isAdmin?'dashboard':'give'); loadData(); } },[me]);

  const onLogin=(d)=>{ store.set(SESS,{token:d.token}); setMe(d); };
  const logout=()=>{ store.del(SESS); setMe(null); setUsers([]); setEmployees([]); setTraining([]); };

  if(!ready) return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading...</div>;
  if(!me) return <Login t={t} onLogin={onLogin} />;

  const NavBtn=({id,icon,label})=>(
    <button onClick={()=>setTab(id)} style={{backgroundColor:tab===id?t.secondary:'transparent'}}
      className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition ${tab===id?'text-white shadow-sm':'text-white/80 hover:bg-white/10'}`}>{icon}<span className="hidden sm:inline">{label}</span></button>
  );

  return (
    <div className="min-h-screen" style={{backgroundColor:t.lightBg}}>
      <header className="bg-white border-b border-slate-200 shadow-sm">
        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3"><Logo className="h-10 object-contain" /><span className="text-slate-400 font-medium text-sm hidden sm:inline">H&amp;S Portal</span></div>
          <div className="flex items-center gap-3">
            <span className="hidden sm:flex items-center gap-2 text-sm text-slate-600"><I.user size={16}/> {me.name} <Badge tone="blue">{roleLabel(me.role)}</Badge></span>
            <button onClick={()=>setShowPw(true)} className="flex items-center gap-1 text-slate-500 hover:text-slate-800 text-sm font-medium"><I.lock size={16}/><span className="hidden sm:inline">Password</span></button>
            <button onClick={logout} className="flex items-center gap-1 text-slate-500 hover:text-slate-800 text-sm font-medium"><I.out size={16}/><span className="hidden sm:inline">Log out</span></button>
          </div>
        </div>
      </header>
      <nav style={{backgroundColor:t.primary}} className="text-white shadow">
        <div className="max-w-6xl mx-auto px-4 flex gap-2 h-12 items-center">
          {isAdmin && <NavBtn id="dashboard" icon={<I.grid size={17}/>} label="Dashboard" />}
          <NavBtn id="give" icon={<I.cert size={17}/>} label="Give training" />
          {isAdmin && <NavBtn id="employees" icon={<I.users size={17}/>} label="Employees" />}
          {isAdmin && <NavBtn id="people" icon={<I.user size={17}/>} label="Logins" />}
        </div>
      </nav>
      <main className="max-w-6xl mx-auto px-4 py-8">
        {tab==='dashboard' && isAdmin && <Dashboard t={t} training={training} onDelete={loadData} me={me} />}
        {tab==='give' && <GiveTraining t={t} employees={employees} onIssued={loadData} />}
        {tab==='employees' && isAdmin && <Employees t={t} employees={employees} reload={loadData} />}
        {tab==='people' && isAdmin && <People t={t} me={me} users={users} reload={loadData} />}
      </main>
      {showPw && <ChangePassword t={t} onClose={()=>setShowPw(false)} />}
    </div>
  );
}

/* ---------------- Login ---------------- */
function Login({ t, onLogin }){
  const [username,setU]=useState(''); const [password,setP]=useState(''); const [code,setCode]=useState('');
  const [needCode,setNeedCode]=useState(!backendReady()); const [err,setErr]=useState(''); const [busy,setBusy]=useState(false);
  const submit=async(e)=>{ e.preventDefault(); setErr(''); setBusy(true);
    try{
      if(CONFIG.BACKEND_PREFIX.indexOf('http')!==0){ setErr('Backend not set up in the app yet.'); setBusy(false); return; }
      if(needCode){ if(!code.trim()){ setErr('Enter your access code.'); setBusy(false); return; } BACKEND_CODE=code.trim(); }
      const r=await api('login',{username:username.trim(),password});
      if(r.ok){ store.set('backend_code',BACKEND_CODE); onLogin({username:r.username,name:r.name,role:r.role,token:r.token}); }
      else setErr('Wrong username or password.');
    }catch(e){ if(e&&e.code==='bad_endpoint'){ setErr('That access code does not match. Check the last 12 characters.'); if(needCode)BACKEND_CODE=''; } else setErr('Could not reach the server. Check your internet.'); }
    finally{ setBusy(false); }
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{backgroundColor:t.lightBg}}>
      <form onSubmit={submit} className="w-full max-w-sm bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden fade">
        <div className="px-8 py-8 text-center border-b border-slate-100"><Logo className="h-16 mx-auto object-contain" /><p className="text-slate-500 text-sm mt-3 font-medium">Health &amp; Safety Portal</p></div>
        <div className="p-8 space-y-4">
          {needCode && <div><label className="block text-sm font-semibold text-slate-700 mb-1">Access code <span className="font-normal text-slate-400">(first time here)</span></label><input value={code} onChange={e=>setCode(e.target.value)} placeholder="12-character code" className="w-full border border-slate-300 rounded-lg px-3 py-2.5 font-mono focus:ring-2 focus:outline-none" style={{'--tw-ring-color':t.primary}} /></div>}
          <div><label className="block text-sm font-semibold text-slate-700 mb-1">Username</label><input autoFocus value={username} onChange={e=>setU(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:outline-none" style={{'--tw-ring-color':t.primary}} /></div>
          <div><label className="block text-sm font-semibold text-slate-700 mb-1">Password</label><input type="password" value={password} onChange={e=>setP(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:outline-none" style={{'--tw-ring-color':t.primary}} /></div>
          {err && <p className="text-sm text-red-600 font-medium">{err}</p>}
          {!needCode && <button type="button" onClick={()=>setNeedCode(true)} className="text-xs text-slate-400 underline">Use a different access code</button>}
          <button disabled={busy} style={{backgroundColor:t.secondary}} className="w-full text-white font-bold py-2.5 rounded-lg hover:brightness-95 transition disabled:opacity-60">{busy?'Signing in...':'Sign in'}</button>
        </div>
      </form>
    </div>
  );
}

/* ---------------- Give training ---------------- */
function GiveTraining({ t, employees, onIssued }){
  const [sel,setSel]=useState({}); const [type,setType]=useState(CONFIG.TRAINING_TYPES[0]);
  const [date,setDate]=useState(todayISO()); const [q,setQ]=useState('');
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState(null);
  const active=employees.filter(e=>e.active!==false);
  const list=active.filter(e=>!q||String(e.name).toLowerCase().includes(q.toLowerCase()));
  const chosen=active.filter(e=>sel[e.id]);
  const toggle=(id)=>setSel(s=>Object.assign({},s,{[id]:!s[id]}));
  const allShown=(v)=>{ const n=Object.assign({},sel); list.forEach(e=>n[e.id]=v); setSel(n); };

  const issue=async()=>{
    if(chosen.length===0){ setMsg({bad:true,text:'Tick at least one person.'}); return; }
    setBusy(true); setMsg({bad:false,text:'Generating certificates...'});
    try{
      const b64=await loadCert(CONFIG.CERT_FILE);
      const tk=store.get(SESS).token; const outputs=[]; let emailedAll=true;
      for(const e of chosen){
        const issueDate=todayISO(); const expiryDate=addYears(date,3);
        const bytes=buildCertBytes(b64,{name:e.name,trainingType:type,trainingDate:date,issueDate,expiryDate});
        outputs.push({name:safeName(type)+'_'+safeName(e.name)+'.docx',bytes});
        const r=await api('recordTraining',{token:tk,employee:e.name,email:e.email,trainingType:type,trainingDate:date,issueDate,expiryDate,certBase64:uint8ToBase64(bytes)});
        if(!(r&&r.ok&&r.emailed)) emailedAll=false;
      }
      downloadCerts(outputs);
      setMsg({bad:false,text:`Issued ${chosen.length} certificate(s). Downloaded`+(emailedAll?' and emailed to each employee and the office.':'. Some emails did not send, check the backend.')});
      setSel({}); onIssued&&onIssued();
    }catch(err){ setMsg({bad:true,text:'Could not issue: '+((err&&err.message)||'check your connection.')}); }
    finally{ setBusy(false); }
  };

  return (
    <div className="space-y-6 fade">
      <h1 className="text-2xl font-bold text-slate-900">Give training</h1>
      <p className="text-slate-600 -mt-4 text-sm">Pick the training, tick the people who did it, and issue. A certificate is generated for each one and emailed to them and the office.</p>

      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="p-5 grid sm:grid-cols-3 gap-4 border-b border-slate-100">
          <div><label className="block text-xs font-semibold text-slate-600 mb-1">Training type</label>
            <select value={type} onChange={e=>setType(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5 bg-white">
              {CONFIG.TRAINING_TYPES.map(x=><option key={x} value={x}>{x}</option>)}
            </select></div>
          <div><label className="block text-xs font-semibold text-slate-600 mb-1">Training date</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5" /></div>
          <div className="flex items-end"><button onClick={issue} disabled={busy} style={{backgroundColor:t.secondary}} className="w-full text-white font-bold py-2.5 rounded-lg hover:brightness-95 disabled:opacity-60">{busy?'Working...':`Issue ${chosen.length||''} cert${chosen.length===1?'':'s'}`}</button></div>
        </div>
        <div className="p-4 flex items-center gap-3 border-b border-slate-100">
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search people" className="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm" />
          <button onClick={()=>allShown(true)} className="text-sm font-semibold" style={{color:t.primary}}>Select all</button>
          <button onClick={()=>allShown(false)} className="text-sm text-slate-500">Clear</button>
        </div>
        {msg && <p className={`px-5 pt-3 text-sm font-medium ${msg.bad?'text-red-600':'text-emerald-600'}`}>{msg.text}</p>}
        <ul className="divide-y divide-slate-100 max-h-96 overflow-auto">
          {active.length===0 && <li className="p-6 text-slate-400 italic">No employees yet. Add them on the Employees tab.</li>}
          {list.map(e=>(
            <li key={e.id} className="px-5 py-2.5 flex items-center gap-3 cursor-pointer hover:bg-slate-50" onClick={()=>toggle(e.id)}>
              <input type="checkbox" checked={!!sel[e.id]} onChange={()=>toggle(e.id)} className="w-4 h-4" />
              <div><p className="font-medium text-slate-800 text-sm">{e.name}</p><p className="text-xs text-slate-400">{e.email||'no email'}</p></div>
            </li>
          ))}
        </ul>
      </div>
    </div>
  );
}

/* ---------------- Dashboard ---------------- */
function certState(row){
  if(!row.expiryDate) return {key:'unknown',tone:'slate',label:'-'};
  const d=daysUntil(row.expiryDate);
  if(d<0) return {key:'expired',tone:'red',label:'Expired'};
  if(d<=90) return {key:'soon',tone:'amber',label:'Expiring soon'};
  return {key:'valid',tone:'green',label:'Valid'};
}
function Dashboard({ t, training, onDelete, me }){
  const [filter,setFilter]=useState('');
  const rows=training.map(r=>Object.assign({},r,{st:certState(r)}));
  const count=(k)=>rows.filter(r=>r.st.key===k).length;
  const shown=rows.filter(r=>!filter||String(r.employee).toLowerCase().includes(filter.toLowerCase())).sort((a,b)=>(a.expiryDate||'').localeCompare(b.expiryDate||''));
  const del=async(r)=>{ if(!window.confirm('Delete this record for '+r.employee+'?'))return; const tk=store.get(SESS).token; await api('deleteTraining',{token:tk,id:r.id}); onDelete&&onDelete(); };
  const cards=[['valid','Valid','text-emerald-600'],['soon','Expiring soon (90 days)','text-amber-600'],['expired','Expired','text-red-600']];
  return (
    <div className="space-y-6 fade">
      <h1 className="text-2xl font-bold text-slate-900">Certificate dashboard</h1>
      <div className="grid grid-cols-3 gap-4">
        {cards.map(c=><div key={c[0]} className="bg-white rounded-xl border border-slate-200 p-5"><p className={`text-3xl font-extrabold ${c[2]}`}>{count(c[0])}</p><p className="text-sm text-slate-500 mt-1">{c[1]}</p></div>)}
      </div>
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="p-4 border-b border-slate-100 flex items-center justify-between gap-3"><h2 className="font-bold text-slate-800">All certificates ({rows.length})</h2><input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Filter by name" className="border border-slate-300 rounded-lg px-3 py-1.5 text-sm" /></div>
        <div className="overflow-x-auto"><table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-left"><tr><th className="px-4 py-2 font-semibold">Employee</th><th className="px-4 py-2 font-semibold">Type</th><th className="px-4 py-2 font-semibold">Trained</th><th className="px-4 py-2 font-semibold">Expires</th><th className="px-4 py-2 font-semibold">Status</th><th className="px-4 py-2"></th></tr></thead>
          <tbody>
            {shown.length===0 && <tr><td colSpan="6" className="px-4 py-6 text-center text-slate-400 italic">No certificates yet.</td></tr>}
            {shown.map(r=>(
              <tr key={r.id} className="border-t border-slate-100">
                <td className="px-4 py-2.5 font-medium text-slate-800">{r.employee}</td>
                <td className="px-4 py-2.5 text-slate-600">{r.trainingType}</td>
                <td className="px-4 py-2.5 text-slate-600">{fmtUK(r.trainingDate)||'-'}</td>
                <td className="px-4 py-2.5 text-slate-600">{fmtUK(r.expiryDate)||'-'}</td>
                <td className="px-4 py-2.5"><Badge tone={r.st.tone}>{r.st.label}</Badge></td>
                <td className="px-4 py-2.5 text-right">{me.role==='admin'||me.role==='superadmin' ? <button onClick={()=>del(r)} className="text-slate-300 hover:text-red-500"><I.trash size={16}/></button> : null}</td>
              </tr>
            ))}
          </tbody>
        </table></div>
      </div>
    </div>
  );
}

/* ---------------- Employees (trainees) ---------------- */
function Employees({ t, employees, reload }){
  const [name,setName]=useState(''); const [email,setEmail]=useState('');
  const [msg,setMsg]=useState(null); const [bulkMsg,setBulkMsg]=useState(null); const [busy,setBusy]=useState(false);
  const add=async(e)=>{ e.preventDefault(); if(!name.trim())return; setBusy(true); setMsg(null);
    const tk=store.get(SESS).token; const r=await api('addEmployee',{token:tk,employee:{name:name.trim(),email:email.trim()}}); setBusy(false);
    if(r.ok){ setName(''); setEmail(''); reload(); } else setMsg({bad:true,text:'Could not add.'});
  };
  const onFile=async(e)=>{ const f=e.target.files[0]; if(!f)return; setBulkMsg(null);
    try{ const wb=XLSX.read(await f.arrayBuffer()); const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      const emps=rows.map(r=>{ const low={}; Object.keys(r).forEach(k=>low[k.toString().trim().toLowerCase()]=r[k]); return {name:String(low.name||'').trim(),email:String(low.email||'').trim()}; }).filter(x=>x.name);
      if(emps.length===0){ setBulkMsg({bad:true,text:'No rows found. Needs columns: name, email.'}); e.target.value=''; return; }
      const tk=store.get(SESS).token; const r=await api('bulkAddEmployees',{token:tk,employees:emps});
      if(r.ok){ setBulkMsg({bad:false,text:`Added ${r.added} employees.`}); reload(); } else setBulkMsg({bad:true,text:'Upload failed.'});
    }catch(err){ setBulkMsg({bad:true,text:'Could not read that file.'}); }
    e.target.value='';
  };
  const del=async(emp)=>{ if(!window.confirm('Remove '+emp.name+'?'))return; const tk=store.get(SESS).token; await api('deleteEmployee',{token:tk,id:emp.id}); reload(); };
  return (
    <div className="space-y-6 fade">
      <h1 className="text-2xl font-bold text-slate-900">Employees</h1>
      <p className="text-slate-600 -mt-4 text-sm">The people who receive training. They do not log in; their certificate is emailed to the address here.</p>
      <div className="grid lg:grid-cols-2 gap-6 items-start">
        <form onSubmit={add} className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div style={{backgroundColor:t.primary}} className="px-5 py-3 text-white font-bold flex items-center gap-2"><I.plus size={18}/> Add one</div>
          <div className="p-5 space-y-3">
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Full name</label><input value={name} onChange={e=>setName(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Email (cert goes here)</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
            {msg && <p className="text-sm text-red-600 font-medium">{msg.text}</p>}
            <button disabled={busy} style={{backgroundColor:t.secondary}} className="w-full text-white font-bold py-2.5 rounded-lg hover:brightness-95 disabled:opacity-60">Add employee</button>
          </div>
        </form>
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div style={{backgroundColor:t.primary}} className="px-5 py-3 text-white font-bold flex items-center gap-2"><I.up size={18}/> Bulk upload (Excel)</div>
          <div className="p-5 space-y-3 text-sm text-slate-600">
            <p>Spreadsheet with columns: <b>name, email</b>. One row per person.</p>
            <label className="flex items-center justify-center gap-2 border-2 border-dashed border-slate-300 rounded-lg py-6 cursor-pointer hover:border-slate-400" style={{color:t.primary}}><I.up size={18}/> <span className="font-semibold">Choose .xlsx or .csv</span><input type="file" accept=".xlsx,.xls,.csv" onChange={onFile} className="hidden" /></label>
            {bulkMsg && <p className={`font-medium ${bulkMsg.bad?'text-red-600':'text-emerald-600'}`}>{bulkMsg.text}</p>}
          </div>
        </div>
      </div>
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="p-4 border-b border-slate-100"><h2 className="font-bold text-slate-800">All employees ({employees.length})</h2></div>
        <ul className="divide-y divide-slate-100">
          {employees.length===0 && <li className="p-6 text-slate-400 italic">None yet.</li>}
          {employees.map(e=><li key={e.id} className="px-5 py-3 flex items-center justify-between"><div><p className="font-medium text-slate-800">{e.name}</p><p className="text-xs text-slate-400">{e.email||'no email'}</p></div><button onClick={()=>del(e)} className="text-slate-300 hover:text-red-500"><I.trash size={16}/></button></li>)}
        </ul>
      </div>
    </div>
  );
}

/* ---------------- Logins (users) ---------------- */
function People({ t, me, users, reload }){
  const canMakeAdmin=me.role==='superadmin';
  const [f,setF]=useState({username:'',name:'',email:'',role:'user',password:genPassword()});
  const [msg,setMsg]=useState(null); const [created,setCreated]=useState(null); const [busy,setBusy]=useState(false); const [bulkMsg,setBulkMsg]=useState(null);
  const set=(k,v)=>setF(x=>Object.assign({},x,{[k]:v}));
  const add=async(e)=>{ e.preventDefault(); setMsg(null); setCreated(null); setBusy(true);
    const tk=store.get(SESS).token; const r=await api('addUser',{token:tk,user:f}); setBusy(false);
    if(r.ok){ setCreated({username:f.username,password:f.password}); setF({username:'',name:'',email:'',role:'user',password:genPassword()}); reload(); }
    else if(r.error==='exists') setMsg({bad:true,text:'That username already exists.'}); else setMsg({bad:true,text:'Could not add.'});
  };
  const onFile=async(e)=>{ const file=e.target.files[0]; if(!file)return; setBulkMsg(null);
    try{ const wb=XLSX.read(await file.arrayBuffer()); const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      const us=rows.map(r=>{ const low={}; Object.keys(r).forEach(k=>low[k.toString().trim().toLowerCase()]=r[k]);
        return {username:String(low.username||'').trim(),name:String(low.name||low.username||'').trim(),email:String(low.email||'').trim(),role:(String(low.role||'user').trim().toLowerCase()==='admin'&&canMakeAdmin)?'admin':'user',password:String(low.password||'').trim()||genPassword()}; }).filter(u=>u.username);
      if(us.length===0){ setBulkMsg({bad:true,text:'Needs columns: username, name, email, role, password.'}); e.target.value=''; return; }
      const tk=store.get(SESS).token; const r=await api('bulkAddUsers',{token:tk,users:us});
      if(r.ok){ setBulkMsg({bad:false,text:`Added ${r.added}, skipped ${r.skipped}.`}); reload(); } else setBulkMsg({bad:true,text:'Upload failed.'});
    }catch(err){ setBulkMsg({bad:true,text:'Could not read that file.'}); } e.target.value='';
  };
  const del=async(u)=>{ if(!window.confirm('Remove '+u.username+'?'))return; const tk=store.get(SESS).token; const r=await api('deleteUser',{token:tk,username:u.username}); if(r.ok)reload(); else alert('Could not remove.'); };
  return (
    <div className="space-y-6 fade">
      <h1 className="text-2xl font-bold text-slate-900">Logins</h1>
      <p className="text-slate-600 -mt-4 text-sm">People who sign in: trainers who issue certificates, plus admins. This is separate from the employee list.</p>
      <div className="grid lg:grid-cols-2 gap-6 items-start">
        <form onSubmit={add} className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div style={{backgroundColor:t.primary}} className="px-5 py-3 text-white font-bold flex items-center gap-2"><I.plus size={18}/> Add a login</div>
          <div className="p-5 space-y-3">
            <div className="grid sm:grid-cols-2 gap-3"><div><label className="block text-xs font-semibold text-slate-600 mb-1">Username</label><input required value={f.username} onChange={e=>set('username',e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2" /></div><div><label className="block text-xs font-semibold text-slate-600 mb-1">Full name</label><input value={f.name} onChange={e=>set('name',e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2" /></div></div>
            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Email</label><input type="email" value={f.email} onChange={e=>set('email',e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2" /></div>
            <div className="grid sm:grid-cols-2 gap-3">
              <div><label className="block text-xs font-semibold text-slate-600 mb-1">Access</label><select value={f.role} onChange={e=>set('role',e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white"><option value="user">Trainer</option>{canMakeAdmin && <option value="admin">Admin</option>}</select></div>
              <div><label className="block text-xs font-semibold text-slate-600 mb-1">Password</label><div className="flex gap-2"><input value={f.password} onChange={e=>set('password',e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 font-mono text-sm" /><button type="button" onClick={()=>set('password',genPassword())} className="text-xs text-slate-500 border border-slate-300 rounded-lg px-2">New</button></div></div>
            </div>
            {msg && <p className="text-sm text-red-600 font-medium">{msg.text}</p>}
            {created && <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm"><p className="font-semibold text-emerald-800 flex items-center gap-1"><I.check size={15}/> Created. Give them:</p><p className="mt-1 font-mono text-slate-700">Username: {created.username}<br/>Password: {created.password}</p></div>}
            <button disabled={busy} style={{backgroundColor:t.secondary}} className="w-full text-white font-bold py-2.5 rounded-lg hover:brightness-95 disabled:opacity-60">{busy?'Adding...':'Add login'}</button>
          </div>
        </form>
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div style={{backgroundColor:t.primary}} className="px-5 py-3 text-white font-bold flex items-center gap-2"><I.up size={18}/> Bulk upload (Excel)</div>
          <div className="p-5 space-y-3 text-sm text-slate-600"><p>Columns: <b>username, name, email, role, password</b>. Blank passwords are generated. {canMakeAdmin?'Role admin is allowed.':'All added as trainers.'}</p>
            <label className="flex items-center justify-center gap-2 border-2 border-dashed border-slate-300 rounded-lg py-6 cursor-pointer hover:border-slate-400" style={{color:t.primary}}><I.up size={18}/> <span className="font-semibold">Choose .xlsx or .csv</span><input type="file" accept=".xlsx,.xls,.csv" onChange={onFile} className="hidden" /></label>
            {bulkMsg && <p className={`font-medium ${bulkMsg.bad?'text-red-600':'text-emerald-600'}`}>{bulkMsg.text}</p>}
          </div>
        </div>
      </div>
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="p-4 border-b border-slate-100"><h2 className="font-bold text-slate-800">All logins ({users.length})</h2></div>
        <div className="overflow-x-auto"><table className="w-full text-sm"><thead className="bg-slate-50 text-slate-500 text-left"><tr><th className="px-4 py-2 font-semibold">Name</th><th className="px-4 py-2 font-semibold">Username</th><th className="px-4 py-2 font-semibold">Email</th><th className="px-4 py-2 font-semibold">Access</th><th className="px-4 py-2"></th></tr></thead>
          <tbody>{users.map(u=><tr key={u.username} className="border-t border-slate-100"><td className="px-4 py-2.5 font-medium text-slate-800">{u.name}</td><td className="px-4 py-2.5 text-slate-600 font-mono text-xs">{u.username}</td><td className="px-4 py-2.5 text-slate-600">{u.email||'-'}</td><td className="px-4 py-2.5"><Badge tone={u.role==='superadmin'?'blue':u.role==='admin'?'green':'slate'}>{roleLabel(u.role)}</Badge></td><td className="px-4 py-2.5 text-right">{u.username!==me.username && <button onClick={()=>del(u)} className="text-slate-300 hover:text-red-500"><I.trash size={16}/></button>}</td></tr>)}</tbody>
        </table></div>
      </div>
    </div>
  );
}

/* ---------------- Change password ---------------- */
function ChangePassword({ t, onClose }){
  const [cur,setCur]=useState(''); const [nw,setNw]=useState(''); const [cf,setCf]=useState(''); const [msg,setMsg]=useState(null); const [busy,setBusy]=useState(false);
  const submit=async(e)=>{ e.preventDefault(); setMsg(null);
    if(nw.length<6){ setMsg({bad:true,text:'New password must be at least 6 characters.'}); return; }
    if(nw!==cf){ setMsg({bad:true,text:'The new passwords do not match.'}); return; }
    setBusy(true);
    try{ const tk=store.get(SESS).token; const r=await api('changePassword',{token:tk,currentPassword:cur,newPassword:nw}); setBusy(false);
      if(r.ok){ setMsg({bad:false,text:'Password changed.'}); setCur('');setNw('');setCf(''); }
      else if(r.error==='bad_current') setMsg({bad:true,text:'Current password is wrong.'});
      else setMsg({bad:true,text:'Could not change password.'});
    }catch(e){ setBusy(false); setMsg({bad:true,text:'Could not reach the server.'}); }
  };
  return (
    <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 fade" onClick={onClose}>
      <form onClick={e=>e.stopPropagation()} onSubmit={submit} className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
        <div style={{backgroundColor:t.primary}} className="px-6 py-4 text-white font-bold flex items-center gap-2"><I.lock size={18}/> Change password</div>
        <div className="p-6 space-y-3">
          <input type="password" placeholder="Current password" value={cur} onChange={e=>setCur(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5" />
          <input type="password" placeholder="New password" value={nw} onChange={e=>setNw(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5" />
          <input type="password" placeholder="Confirm new password" value={cf} onChange={e=>setCf(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5" />
          {msg && <p className={`text-sm font-medium ${msg.bad?'text-red-600':'text-emerald-600'}`}>{msg.text}</p>}
          <div className="flex gap-2 pt-1"><button type="button" onClick={onClose} className="flex-1 border border-slate-300 rounded-lg py-2.5 text-slate-600 font-semibold">Close</button><button disabled={busy} style={{backgroundColor:t.secondary}} className="flex-1 text-white font-bold py-2.5 rounded-lg disabled:opacity-60">{busy?'Saving...':'Save'}</button></div>
        </div>
      </form>
    </div>
  );
}
